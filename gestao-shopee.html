<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Gestão Shopee VUC</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0f13;--sf:#1c1f27;--s2:#21252e;--bd:#272b36;--tx:#eef0f4;--t2:#7a8294;--ac:#f05a28;--gn:#34d399;--rd:#f43f5e;--yw:#fbbf24;--bl:#60a5fa}
.light{--bg:#f0f4f8;--sf:#fff;--s2:#f8fafc;--bd:#e2e8f0;--tx:#1a202c;--t2:#64748b;--gn:#16a34a;--rd:#e11d48;--yw:#d97706;--bl:#2563eb}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--tx);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus,select:focus{border-color:var(--ac)!important;outline:none}

/* ── LOGIN ──────────────────────────────────────────────────────── */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px}
.login-logo{width:88px;height:88px;border-radius:24px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:24px;box-shadow:0 16px 40px rgba(240,90,40,.35)}
.login-title{font-size:28px;font-weight:800;font-family:'Sora',sans-serif;color:var(--tx);text-align:center;margin-bottom:8px}
.login-sub{font-size:14px;color:var(--t2);text-align:center;margin-bottom:40px;line-height:1.6;max-width:300px}
.google-btn{display:flex;align-items:center;gap:12px;background:#fff;color:#1a202c;border:none;border-radius:14px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;box-shadow:0 4px 20px rgba(0,0,0,.15);transition:.2s;width:100%;max-width:300px;justify-content:center}
.google-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.22)}
.login-version{font-size:11px;color:var(--t2);margin-top:32px}

/* ── LAYOUT DESKTOP ─────────────────────────────────────────────── */
#app{display:none;min-height:100vh;flex-direction:column}
#app.visible{display:flex}

/* Sidebar (desktop) */
#sidebar{display:none;width:240px;min-height:100vh;background:var(--sf);border-right:1px solid var(--bd);flex-direction:column;position:fixed;top:0;left:0;z-index:100;padding:0}
.sb-header{padding:20px 20px 16px;border-bottom:1px solid var(--bd)}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sb-logo-box{width:36px;height:36px;border-radius:10px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo-tx{font-size:13px;font-weight:800;font-family:'Sora',sans-serif;color:var(--tx);line-height:1.2}
.sb-logo-sb{font-size:10px;color:var(--t2)}
.sb-user{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--s2);border-radius:10px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.sb-avatar img{width:100%;height:100%;object-fit:cover}
.sb-uname{font-size:12px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-uemail{font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-nav{padding:12px 12px;flex:1}
.sb-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:4px;border:none;background:none;width:100%;text-align:left;color:var(--t2);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:.15s}
.sb-nav-item:hover{background:var(--s2);color:var(--tx)}
.sb-nav-item.active{background:rgba(240,90,40,.12);color:var(--ac)}
.sb-nav-icon{font-size:18px;flex-shrink:0}
.sb-bottom{padding:12px;border-top:1px solid var(--bd)}
.sb-signout{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;cursor:pointer;border:none;background:none;width:100%;color:var(--t2);font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:.15s}
.sb-signout:hover{background:rgba(244,63,94,.08);color:var(--rd)}

/* Main content area */
#main-wrap{display:flex;flex:1;min-height:100vh}
#content-area{flex:1;padding:24px;overflow-y:auto;min-height:100vh}

/* Mobile header */
#mob-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:200;backdrop-filter:blur(12px)}
.light #mob-hdr{background:rgba(255,255,255,.96)}
.mob-logo{display:flex;align-items:center;gap:8px}
.mob-logo-box{width:34px;height:34px;border-radius:10px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:18px}
.mob-logo-tx{font-size:14px;font-weight:800;font-family:'Sora',sans-serif;color:var(--tx)}
.mob-logo-sb{font-size:10px;color:var(--t2)}
.mob-actions{display:flex;gap:8px;align-items:center}
.icon-btn{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:7px 11px;cursor:pointer;font-size:16px;color:var(--tx)}

/* Bottom nav (mobile) */
#mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(28,31,39,.97);backdrop-filter:blur(14px);border-top:1px solid var(--bd);z-index:200}
.light #mob-nav{background:rgba(255,255,255,.97)}
.nb{flex:1;padding:9px 4px 11px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2.5px solid transparent;color:var(--t2);transition:.15s}
.nb.active{border-color:var(--ac);color:var(--ac)}
.ni{font-size:20px;line-height:1}.nl{font-size:10px;font-weight:600;font-family:'Sora',sans-serif;letter-spacing:.03em}

/* Desktop show/hide */
@media(min-width:768px){
  #sidebar{display:flex}
  #mob-hdr{display:none}
  #mob-nav{display:none}
  #content-area{margin-left:240px;padding:28px 32px;padding-bottom:28px}
  #cnt{max-width:1100px;margin:0 auto}
}
@media(max-width:767px){
  #content-area{padding:16px 14px 90px}
}

/* ── CARDS ──────────────────────────────────────────────────────── */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:16px}
.ct{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
@media(min-width:768px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:16px;border-left:3px solid}
.ki{font-size:22px;margin-bottom:6px}
.kl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.kv{font-size:17px;font-weight:800;font-family:'Sora',sans-serif;margin:5px 0 3px;line-height:1.2}
.ks{font-size:10px;color:var(--t2)}

/* 2-col desktop layout */
.two-col{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:768px){.two-col{grid-template-columns:1fr 1fr}}

/* Buttons */
.btn{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;width:100%;transition:.15s}
.btn:active{opacity:.8}
.bsm{padding:8px 16px;font-size:12px;border-radius:8px;width:auto}
.brd{background:var(--rd)}.bgh{background:var(--s2);color:var(--tx);border:1.5px solid var(--bd)}

/* Rows / items */
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd)}
.row:last-child{border-bottom:none}
.rl{font-size:13px;color:var(--t2)}.rv{font-size:13px;font-weight:700;color:var(--tx)}
.item{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 14px;border-radius:10px;margin-bottom:8px;background:var(--s2);border:1px solid var(--bd)}
.itx{font-size:13px;font-weight:600;color:var(--tx)}.isb{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.5}

/* Form */
.fld{margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.inp{width:100%;padding:11px 13px;border-radius:10px;font-size:14px;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx);font-family:'DM Sans',sans-serif}
.inp-row{display:flex;gap:10px}
.inp-row .fld{flex:1;margin-bottom:0}

/* Days picker */
.days-pick{display:flex;gap:6px;margin-top:4px}
.day-btn{flex:1;padding:10px 4px;border-radius:8px;border:1.5px solid var(--bd);background:var(--s2);color:var(--t2);cursor:pointer;font-size:12px;font-weight:600;font-family:'Sora',sans-serif;text-align:center;transition:.15s}
.day-btn.on{border-color:var(--ac);background:rgba(240,90,40,.12);color:var(--ac);font-weight:700}

/* Modal */
#ov{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);align-items:flex-end;justify-content:center}
#ov.open{display:flex}
@media(min-width:768px){#ov{align-items:center}}
#mb{background:var(--sf);border:1px solid var(--bd);border-radius:20px 20px 0 0;padding:8px 0 0;width:100%;max-width:520px;max-height:93vh;overflow-y:auto;animation:up .25s cubic-bezier(.4,0,.2,1)}
@media(min-width:768px){#mb{border-radius:20px;max-height:88vh}}
@keyframes up{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.drag{width:36px;height:4px;border-radius:2px;background:var(--bd);margin:0 auto 16px}
@media(min-width:768px){.drag{display:none}}
.mi{padding:0 22px 32px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt{font-size:17px;font-weight:800;font-family:'Sora',sans-serif;color:var(--tx)}
.mc{background:var(--s2);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:18px;color:var(--t2);display:flex;align-items:center;justify-content:center}

/* Calc box */
.cbox{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:14px}
.crow{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:var(--t2)}
.crow b{color:var(--tx)}
.ctot{border-top:1px solid var(--bd);margin-top:6px;padding-top:10px;font-weight:800;font-size:14px;color:var(--tx)}

/* Charts */
.chw{display:flex;align-items:flex-end;gap:6px;height:64px}
.cbw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.cb{width:100%;border-radius:4px;background:var(--ac);transition:height .5s cubic-bezier(.4,0,.2,1)}
.clb{font-size:9px;color:var(--t2)}
@media(min-width:768px){.chw{height:80px}}

/* Alerts */
.alrt{border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px}
.aicon{font-size:20px;flex-shrink:0;margin-top:1px}
.atitle{font-size:13px;font-weight:700}.asub{font-size:11px;margin-top:2px;opacity:.85}
.a-or{background:rgba(240,90,40,.1);border:1px solid rgba(240,90,40,.25);color:var(--ac)}
.a-rd{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25);color:var(--rd)}
.a-yw{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);color:var(--yw)}
.a-bl{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);color:var(--bl)}

/* Toggle */
.trow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:8px}
.trow:last-child{border-bottom:none}
.tog{position:relative;width:44px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.sldr{position:absolute;cursor:pointer;inset:0;background:var(--bd);border-radius:99px;transition:.3s}
.sldr:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.sldr{background:var(--ac)}
input:checked+.sldr:before{transform:translateX(20px)}

/* Proj bar */
.pbg{background:var(--bd);border-radius:99px;height:8px;overflow:hidden;margin:8px 0 4px}
.pfill{height:100%;border-radius:99px;background:var(--ac);transition:width .6s}

/* Sync indicator */
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gn);display:inline-block;margin-right:4px}
.sync-dot.syncing{background:var(--yw);animation:pulse 1s infinite}
.sync-dot.error{background:var(--rd)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Colors */
.c-gn{color:var(--gn)}.c-rd{color:var(--rd)}.c-yw{color:var(--yw)}.c-ac{color:var(--ac)}.c-bl{color:var(--bl)}
.fw8{font-weight:800}.ff{font-family:'Sora',sans-serif}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.st{font-size:20px;font-weight:800;font-family:'Sora',sans-serif;color:var(--tx)}
.del{background:none;border:none;cursor:pointer;font-size:16px;color:var(--rd);padding:4px;flex-shrink:0}
.nfe-box{background:rgba(240,90,40,.07);border:1px solid rgba(240,90,40,.22);border-radius:16px;padding:16px;margin-bottom:16px}
.light .nfe-box{background:#fff5f0;border-color:#fcd9c8}
.empty{text-align:center;padding:48px 20px;color:var(--t2)}
.divider{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px}

/* Loading */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--t2);font-family:'Sora',sans-serif">Carregando...</div>
</div>

<!-- Login -->
<div id="login-screen" style="display:none">
  <div class="login-logo">🚛</div>
  <div class="login-title">Gestão Shopee VUC</div>
  <div class="login-sub">Sistema de gestão financeira para coletas Shopee · Jundiaí/SP</div>
  <button class="google-btn" onclick="loginGoogle()">
    <svg width="22" height="22" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
    Entrar com Google
  </button>
  <div class="login-version">v5.0 · Firebase Cloud Sync</div>
</div>

<!-- App -->
<div id="app">
  <!-- Sidebar desktop -->
  <div id="sidebar">
    <div class="sb-header">
      <div class="sb-logo">
        <div class="sb-logo-box">🚛</div>
        <div><div class="sb-logo-tx">Gestão Shopee VUC</div><div class="sb-logo-sb">Jundiaí · SP</div></div>
      </div>
      <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">R</div>
        <div style="overflow:hidden">
          <div class="sb-uname" id="sb-uname">Usuário</div>
          <div class="sb-uemail" id="sb-uemail"></div>
        </div>
      </div>
    </div>
    <div class="sb-nav">
      <button class="sb-nav-item active" onclick="go('dash')" id="sb-dash"><span class="sb-nav-icon">📊</span> Painel</button>
      <button class="sb-nav-item" onclick="go('ent')" id="sb-ent"><span class="sb-nav-icon">📥</span> Entradas</button>
      <button class="sb-nav-item" onclick="go('desp')" id="sb-desp"><span class="sb-nav-icon">📤</span> Despesas</button>
      <button class="sb-nav-item" onclick="go('cfg')" id="sb-cfg"><span class="sb-nav-icon">⚙️</span> Configurações</button>
    </div>
    <div class="sb-bottom">
      <div style="display:flex;align-items:center;gap:6px;padding:8px 12px;margin-bottom:6px">
        <span class="sync-dot" id="sync-dot"></span>
        <span style="font-size:11px;color:var(--t2)" id="sync-txt">Sincronizado</span>
      </div>
      <button class="sb-signout" onclick="logout()">🚪 Sair da conta</button>
    </div>
  </div>

  <!-- Mobile header -->
  <div id="mob-hdr">
    <div class="mob-logo">
      <div class="mob-logo-box">🚛</div>
      <div><div class="mob-logo-tx">Gestão Shopee VUC</div><div class="mob-logo-sb">Jundiaí · SP</div></div>
    </div>
    <div class="mob-actions">
      <span class="sync-dot" id="sync-dot-mob"></span>
      <button class="icon-btn" onclick="exportBackup()" title="Backup">💾</button>
      <button class="icon-btn" onclick="toggleTheme()">☀️</button>
    </div>
  </div>

  <!-- Content -->
  <div id="main-wrap">
    <div id="content-area">
      <div id="cnt"></div>
    </div>
  </div>

  <!-- Mobile nav -->
  <div id="mob-nav">
    <button class="nb active" onclick="go('dash')" id="nav-dash"><span class="ni">📊</span><span class="nl">Painel</span></button>
    <button class="nb" onclick="go('ent')" id="nav-ent"><span class="ni">📥</span><span class="nl">Entradas</span></button>
    <button class="nb" onclick="go('desp')" id="nav-desp"><span class="ni">📤</span><span class="nl">Despesas</span></button>
    <button class="nb" onclick="go('cfg')" id="nav-cfg"><span class="ni">⚙️</span><span class="nl">Config</span></button>
  </div>
</div>

<!-- Modal -->
<div id="ov" onclick="closeModal()">
  <div id="mb" onclick="event.stopPropagation()">
    <div class="drag"></div>
    <div class="mi" id="mi"></div>
  </div>
</div>

<input type="file" id="restore-input" accept=".json" style="display:none" onchange="importBackup(this)"/>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCYjJ9qo8_rsSwIweRCJofpW-7VXDlgvU",
  authDomain: "gestao-shopee-vuc.firebaseapp.com",
  projectId: "gestao-shopee-vuc",
  storageBucket: "gestao-shopee-vuc.firebasestorage.app",
  messagingSenderId: "1056199349311",
  appId: "1:1056199349311:web:0e464180a32a3a10ef948a"
};

const fireApp  = initializeApp(firebaseConfig);
const auth     = getAuth(fireApp);
const db       = getFirestore(fireApp);
const provider = new GoogleAuthProvider();

let currentUser = null;
let unsubSnap   = null;

// ── Auth ──────────────────────────────────────────────────────────
window.loginGoogle = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e){ alert('Erro ao fazer login: '+e.message); }
};
window.logout = async () => {
  if(!confirm('Sair da conta?')) return;
  if(unsubSnap) unsubSnap();
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  document.getElementById('loading').style.display = 'none';
  if(user){
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    // Update sidebar user info
    document.getElementById('sb-uname').textContent = user.displayName || 'Usuário';
    document.getElementById('sb-uemail').textContent = user.email || '';
    const av = document.getElementById('sb-avatar');
    if(user.photoURL){ av.innerHTML=`<img src="${user.photoURL}" alt="">`; }
    else { av.textContent = (user.displayName||'U')[0].toUpperCase(); }
    if(window.applyTheme) window.applyTheme();
    subscribeData(user.uid);
  } else {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').classList.remove('visible');
    if(unsubSnap){ unsubSnap(); unsubSnap=null; }
  }
});

// ── Firestore sync ────────────────────────────────────────────────
function subscribeData(uid){
  setSyncState('syncing');
  const ref = doc(db, 'users', uid);
  unsubSnap = onSnapshot(ref, snap => {
    if(snap.exists()){
      const remote = snap.data();
      DB.semanas   = remote.semanas   || [];
      DB.variaveis = remote.variaveis || [];
      DB.cfg       = { ...defCfg(), ...remote.cfg, lem:{...defCfg().lem,...(remote.cfg?.lem||{})} };
    }
    setSyncState('ok');
    if(window.applyTheme) window.applyTheme();
    if(window.render) window.render();
  }, err => { setSyncState('error'); console.error(err); });
}

window.saveDB = async () => {
  if(!currentUser) return;
  setSyncState('syncing');
  try {
    await setDoc(doc(db,'users',currentUser.uid), {
      semanas:   DB.semanas,
      variaveis: DB.variaveis,
      cfg:       DB.cfg
    });
    setSyncState('ok');
  } catch(e){ setSyncState('error'); console.error(e); }
};

function setSyncState(state){
  const dots = [document.getElementById('sync-dot'), document.getElementById('sync-dot-mob')];
  const txt  = document.getElementById('sync-txt');
  dots.forEach(d=>{ if(!d) return; d.className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':''); });
  if(txt) txt.textContent = state==='syncing'?'Sincronizando...':state==='error'?'Erro ao salvar':'Sincronizado';
}
</script>

<script>
// ═══════════ DB ═══════════════════════════════════════════════════
function defCfg(){
  return { fixoDia:160, pedagioDia:30, pedagioShopee:35, valorPacote:0.50, diaria:120, valeRefeicaoDia:20, financiamento:1800, seguro:0, fixasExtras:[], tema:'dark', lem:{nfSeg:true,salario:true,ipva:true,ipvaMes:7,seguro:false,seguroVenc:'',revisao:true,revisaoMeses:3,revisaoUlt:''} };
}
let DB = { cfg:defCfg(), semanas:[], variaveis:[] };

// ═══════════ HELPERS ══════════════════════════════════════════════
const R$=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().slice(0,10);
const MN=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MF=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CATS={'Combustível':'⛽','Manutenção':'🔧','Pneus/Peças':'🔩','IPVA/Licenciamento':'📋','Outros':'📌'};
function mAStr(ds){ if(!ds)return ''; const d=new Date(ds+'T12:00:00'); return String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function curMA(){ const d=new Date(); return String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function mALbl(ma){ if(!ma)return ''; const[m,y]=ma.split('/'); return MN[parseInt(m)-1]+' '+y; }
function grpBy(arr){ const g={}; [...arr].reverse().forEach(x=>{ const k=mAStr(x.data); if(!g[k])g[k]=[]; g[k].push(x); }); return g; }
function save(){ if(window.saveDB) window.saveDB(); }

// ═══════════ THEME ════════════════════════════════════════════════
window.applyTheme=function(){ document.body.classList.toggle('light',DB.cfg.tema==='light'); const b=document.getElementById('tbtn-mob'); if(b) b.textContent=DB.cfg.tema==='dark'?'☀️':'🌙'; }
window.toggleTheme=()=>{ DB.cfg.tema=DB.cfg.tema==='dark'?'light':'dark'; save(); window.applyTheme(); };

// ═══════════ TABS ═════════════════════════════════════════════════
let TAB='dash';
window.go=t=>{
  TAB=t;

  });
  render(); window.scrollTo(0,0);
};

// ═══════════ COMPUTE ══════════════════════════════════════════════
function compute(ma){
  ma=ma||curMA();
  const c=DB.cfg, semMes=DB.semanas.filter(s=>mAStr(s.data)===ma), varMes=DB.variaveis.filter(v=>mAStr(v.data)===ma);
  const recBruta=semMes.reduce((a,s)=>a+(+s.total||0),0), totPkts=semMes.reduce((a,s)=>a+(+s.pkts||0),0);
  const totDias=semMes.reduce((a,s)=>a+(+s.dias||0),0), custoMot=semMes.reduce((a,s)=>a+(+s.custoMot||0),0);
  const totalFixas=(+c.financiamento||0)+(+c.seguro||0)+(c.fixasExtras||[]).reduce((a,x)=>a+(+x.valor||0),0);
  const totalVar=varMes.reduce((a,v)=>a+(+v.valor||0),0), totalDesp=totalFixas+totalVar+custoMot;
  const lucro=recBruta-totalDesp, custoPkt=totPkts>0?totalDesp/totPkts:0;
  const semCont=semMes.length, mediaRec=semCont>0?recBruta/semCont:0, proj=mediaRec*4.3;
  return {ma,semMes,varMes,recBruta,totPkts,totDias,custoMot,totalFixas,totalVar,totalDesp,lucro,custoPkt,semCont,proj};
}
function calcSem(total,dias,pedagio){
  const c=DB.cfg, d=+dias||0, fixoTotal=(+c.fixoDia||0)*d, pedPago=+pedagio||0;
  const valPkts=Math.max(0,(+total||0)-fixoTotal-pedPago), pkts=(+c.valorPacote||0.5)>0?Math.round(valPkts/(+c.valorPacote||0.5)):0;
  const sobraPed=(+c.pedagioShopee||0)*d-pedPago, custoMot=((+c.diaria||0)+(+c.valeRefeicaoDia||0))*d;
  return {fixoTotal,pedPago,valPkts,pkts,sobraPed,custoMot,check:Math.abs(fixoTotal+pedPago+valPkts-(+total||0))<0.02};
}

// ═══════════ ALERTS ═══════════════════════════════════════════════
function getAlerts(){
  const al=[],l=DB.cfg.lem||{},now=new Date(),dow=now.getDay(),dom=now.getDate(),mes=now.getMonth()+1;

  if(l.revisao&&l.revisaoUlt){const ult=new Date(l.revisaoUlt+'T12:00:00'),prox=new Date(ult);prox.setMonth(prox.getMonth()+(+l.revisaoMeses||3));const diff=Math.ceil((prox-now)/86400000);if(diff<0) al.push({tp:'a-rd',icon:'🔧',title:'Revisão atrasada!',sub:`Prevista: ${prox.toLocaleDateString('pt-BR')}`});else if(diff<=15) al.push({tp:'a-yw',icon:'🔧',title:`Revisão em ${diff} dia(s)`,sub:`Próxima: ${prox.toLocaleDateString('pt-BR')}`});}
  return al;
}

// ═══════════ CHARTS ═══════════════════════════════════════════════
function chartReceita(){
  const vs=Array.from({length:6},(_,i)=>{const d=new Date();d.setMonth(d.getMonth()-(5-i));const k=String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();return{label:MN[d.getMonth()],val:DB.semanas.filter(s=>mAStr(s.data)===k).reduce((a,s)=>a+(+s.total||0),0)};});
  const max=Math.max(...vs.map(v=>v.val),1);
  return vs.map((v,i)=>`<div class="cbw"><div class="cb" style="height:${Math.max(4,(v.val/max)*58)}px;opacity:${i===5?1:.35}"></div><span class="clb">${v.label}</span></div>`).join('');
}
function chartPacotes(){
  const vs=Array.from({length:6},(_,i)=>{const d=new Date();d.setMonth(d.getMonth()-(5-i));const k=String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();return{label:MN[d.getMonth()],val:DB.semanas.filter(s=>mAStr(s.data)===k).reduce((a,s)=>a+(+s.pkts||0),0)};});

function togAd(v){ const el=document.getElementById('wrap-ad'); if(el) el.style.display=v==='quinzenal'?'block':'none'; }
function scf(f,v){ DB.cfg[f]=isNaN(+v)||v===''?v:+v; save(); }
function sl(f,v){ if(!DB.cfg.lem) DB.cfg.lem={}; DB.cfg.lem[f]=v; save(); }
function addExtra(){ const n=document.getElementById('ex-n')?.value.trim(),v=document.getElementById('ex-v')?.value; if(!n||!v)return; if(!DB.cfg.fixasExtras)DB.cfg.fixasExtras=[]; DB.cfg.fixasExtras.push({nome:n,valor:+v}); save(); refreshExtras(); document.getElementById('ex-n').value=''; document.getElementById('ex-v').value=''; }
function remExtra(i){ DB.cfg.fixasExtras.splice(i,1); save(); refreshExtras(); }
function refreshExtras(){ const el=document.getElementById('extras-list'); if(!el)return; el.innerHTML=(DB.cfg.fixasExtras||[]).map((f,i)=>`<div class="item"><div style="flex:1"><div class="itx">${f.nome}</div></div><div style="display:flex;align-items:center;gap:8px"><span class="fw8 c-rd">${R$(f.valor)}</span><button class="del" onclick="remExtra(${i})">🗑</button></div></div>`).join(''); }

// ═══════════ MODAL SEMANA ═════════════════════════════════════════
let selDias=5;
window.openModal=t=>{ const mi=document.getElementById('mi'); selDias=5; if(t==='sem') mi.innerHTML=modalSem(); if(t==='var') mi.innerHTML=modalVar(); document.getElementById('ov').classList.add('open'); };
window.closeModal=()=>document.getElementById('ov').classList.remove('open');

function modalSem(s){
  const c=DB.cfg, dias=['Seg','Ter','Qua','Qui','Sex','Sáb'], isEdit=!!s;
  if(s) selDias=s.dias||5;
  const pedDia=s?(s.pedDia||(s.dias>0?Math.round(s.pedPago/s.dias):0)):(c.pedagioDia||0);
  return `
    <div class="mh"><span class="mt">${isEdit?'Editar Semana':'Lançar Semana'}</span><button class="mc" onclick="closeModal()">×</button></div>
    <div class="fld"><label class="lbl">Data de fechamento da semana</label><input class="inp" type="date" id="ms-data" value="${s?s.data:today()}"></div>
    <div class="fld">
      <label class="lbl">Dias trabalhados nesta semana</label>
      <div class="days-pick">${dias.map((d,i)=>`<button class="day-btn${(isEdit?i<selDias:i<5)?' on':''}" id="day-${i}" onclick="togDay(${i})">${d}</button>`).join('')}</div>
      <div style="font-size:12px;color:var(--t2);margin-top:8px;text-align:center">
        <span id="dias-count" class="fw8 c-ac">${selDias} dias</span> trabalhados · Fixo <span id="dias-fixo" class="c-gn fw8">${R$((c.fixoDia||0)*selDias)}</span> · Motorista <span id="dias-mot" class="c-bl fw8">${R$(((c.diaria||0)+(c.valeRefeicaoDia||0))*selDias)}</span>
      </div>
    </div>
    <div class="fld"><label class="lbl">Pedágio gasto por dia (R$)</label><input class="inp" type="number" id="ms-ped-dia" value="${pedDia}" oninput="prevSem()"><div style="font-size:11px;color:var(--t2);margin-top:5px">Total = valor/dia × dias trabalhados ✓</div></div>
    <div class="fld"><label class="lbl">Valor total recebido da Shopee (R$)</label><input class="inp" type="number" id="ms-tot" value="${s?s.total:''}" placeholder="Copie do app da Shopee" style="font-size:18px;font-weight:700" oninput="prevSem()"></div>
    <div id="ms-prev" style="display:none">
      <div class="cbox">
        <div style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">📊 Cálculo automático</div>
        <div class="crow"><span>Total recebido</span><b id="pv-tot"></b></div>
        <div class="crow"><span>− Fixo de saída (<span id="pv-dias-txt"></span> dias)</span><span id="pv-fixo" class="c-rd"></span></div>
        <div class="crow"><span>− Pedágio gasto</span><span id="pv-ped" class="c-rd"></span></div>
        <div class="crow ctot"><span>= Valor dos pacotes</span><span id="pv-vpkt" class="c-gn"></span></div>
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)">
          <div class="crow"><span>📦 Pacotes coletados</span><span id="pv-pkts" class="fw8 c-ac" style="font-size:16px"></span></div>
          <div class="crow"><span>💛 Sobra de pedágio</span><span id="pv-sob" class="fw8 c-yw"></span></div>
          <div class="crow"><span>👤 Custo motorista</span><span id="pv-mot" class="fw8 c-bl"></span></div>
        </div>
        <div id="pv-chk" style="margin-top:10px;font-size:12px;font-weight:700;text-align:center;padding:8px;border-radius:8px"></div>
      </div>
    </div>
    <div class="fld"><label class="lbl">Observações</label><input class="inp" id="ms-obs" value="${s?s.obs||'':''}" placeholder="Opcional"></div>
    ${isEdit?`<button class="btn" onclick="updateSem('${s.id}')">💾 Salvar alterações</button>`:`<button class="btn" onclick="saveSem()">✅ Salvar semana</button>`}`;
}

function togDay(i){
  const btn=document.getElementById('day-'+i); if(!btn)return;
  btn.classList.toggle('on'); selDias=document.querySelectorAll('.day-btn.on').length;
  const c=DB.cfg;
  const dEl=document.getElementById('dias-count'); if(dEl) dEl.textContent=selDias+' dia'+(selDias!==1?'s':'');
  const fEl=document.getElementById('dias-fixo');  if(fEl) fEl.textContent=R$((c.fixoDia||0)*selDias);
  const mEl=document.getElementById('dias-mot');   if(mEl) mEl.textContent=R$(((c.diaria||0)+(c.valeRefeicaoDia||0))*selDias);
  prevSem();
}
function prevSem(){
  const tot=parseFloat(document.getElementById('ms-tot')?.value)||0, pedDia=parseFloat(document.getElementById('ms-ped-dia')?.value)||0, ped=pedDia*selDias;
  const pv=document.getElementById('ms-prev'); if(!pv)return;
  if(tot<=0){pv.style.display='none';return;}
  pv.style.display='block';
  const cx=calcSem(tot,selDias,ped);
  document.getElementById('pv-tot').textContent=R$(tot);
  document.getElementById('pv-dias-txt').textContent=selDias;
  document.getElementById('pv-fixo').textContent='− '+R$(cx.fixoTotal);
  document.getElementById('pv-ped').textContent='− '+R$(cx.pedPago)+' ('+selDias+'d × '+R$(pedDia)+')';
  document.getElementById('pv-vpkt').textContent=R$(cx.valPkts);
  document.getElementById('pv-pkts').textContent=cx.pkts.toLocaleString('pt-BR')+' pacotes';
  document.getElementById('pv-sob').textContent=R$(cx.sobraPed);
  document.getElementById('pv-mot').textContent=R$(cx.custoMot);
  const chk=document.getElementById('pv-chk');
  chk.textContent=cx.check?'✔ Conta fechando corretamente':'⚠ Verifique: a soma não fecha com o total';
  chk.style.cssText=`margin-top:10px;font-size:12px;font-weight:700;text-align:center;padding:8px;border-radius:8px;background:${cx.check?'rgba(52,211,153,.1)':'rgba(244,63,94,.1)'};color:${cx.check?'var(--gn)':'var(--rd)'}`;
}
function saveSem(){
  const tot=parseFloat(document.getElementById('ms-tot')?.value)||0, pedDia=parseFloat(document.getElementById('ms-ped-dia')?.value)||0, ped=pedDia*selDias;
  const data=document.getElementById('ms-data')?.value, obs=document.getElementById('ms-obs')?.value||'';
  if(!tot){alert('Informe o valor total recebido.');return;}
  if(selDias===0){alert('Selecione ao menos um dia trabalhado.');return;}
  const cx=calcSem(tot,selDias,ped);
  DB.semanas.push({id:uid(),data,total:tot,dias:selDias,pedDia,pedPago:cx.pedPago,fixoTotal:cx.fixoTotal,valPkts:cx.valPkts,pkts:cx.pkts,sobraPed:cx.sobraPed,custoMot:cx.custoMot,obs});
  save(); closeModal(); render();
}
window.editSem=id=>{ const s=DB.semanas.find(x=>x.id===id); if(!s)return; document.getElementById('mi').innerHTML=modalSem(s); document.getElementById('ov').classList.add('open'); setTimeout(prevSem,50); };
window.updateSem=id=>{
  const tot=parseFloat(document.getElementById('ms-tot')?.value)||0, pedDia=parseFloat(document.getElementById('ms-ped-dia')?.value)||0, ped=pedDia*selDias;
  const data=document.getElementById('ms-data')?.value, obs=document.getElementById('ms-obs')?.value||'';
  if(!tot){alert('Informe o valor total recebido.');return;}
  const cx=calcSem(tot,selDias,ped), idx=DB.semanas.findIndex(x=>x.id===id); if(idx<0)return;
  DB.semanas[idx]={id,data,total:tot,dias:selDias,pedDia,pedPago:cx.pedPago,fixoTotal:cx.fixoTotal,valPkts:cx.valPkts,pkts:cx.pkts,sobraPed:cx.sobraPed,custoMot:cx.custoMot,obs};
  save(); closeModal(); render(); showToast('✅ Lançamento atualizado!');
};

// ═══════════ MODAL VARIAVEL ═══════════════════════════════════════
function modalVar(){
  return `<div class="mh"><span class="mt">Nova Despesa Variável</span><button class="mc" onclick="closeModal()">×</button></div>
    <div class="fld"><label class="lbl">Categoria</label><select class="inp" id="mv-cat" onchange="chkNovaCat()">${Object.keys(CATS).map(c=>`<option>${c}</option>`).join('')}<option value="__nova">➕ Nova categoria...</option></select></div>
    <div id="mv-nw" style="display:none"><div class="fld"><label class="lbl">Nome da nova categoria</label><input class="inp" id="mv-nova" placeholder="Ex: Lavagem"></div></div>
    <div class="fld"><label class="lbl">Data</label><input class="inp" type="date" id="mv-data" value="${today()}"></div>
    <div class="fld"><label class="lbl">Valor (R$)</label><input class="inp" type="number" id="mv-val" placeholder="Ex: 250,00"></div>
    <div class="fld"><label class="lbl">Observações</label><input class="inp" id="mv-obs" placeholder="Ex: troca de óleo"></div>
    <button class="btn brd" onclick="saveVar()">💸 Salvar despesa</button>`;
}
function chkNovaCat(){ const v=document.getElementById('mv-cat')?.value; const el=document.getElementById('mv-nw'); if(el) el.style.display=v==='__nova'?'block':'none'; }
function saveVar(){
  const catSel=document.getElementById('mv-cat')?.value, cat=catSel==='__nova'?(document.getElementById('mv-nova')?.value||'Outros'):catSel;
  const data=document.getElementById('mv-data')?.value, val=document.getElementById('mv-val')?.value, obs=document.getElementById('mv-obs')?.value||'';
  if(!val){alert('Informe o valor.');return;}
  DB.variaveis.push({id:uid(),data,cat,valor:+val,obs}); save(); closeModal(); render();
}

// ═══════════ DELETE ═══════════════════════════════════════════════
window.delSem=id=>{ if(!confirm('Excluir este lançamento?'))return; DB.semanas=DB.semanas.filter(s=>s.id!==id); save(); render(); };
window.delVar=id=>{ if(!confirm('Excluir esta despesa?'))return; DB.variaveis=DB.variaveis.filter(v=>v.id!==id); save(); render(); };

// ═══════════ BACKUP ═══════════════════════════════════════════════
window.exportBackup=()=>{
  const json=JSON.stringify(DB,null,2), blob=new Blob([json],{type:'application/json'}), url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download=`shopee-vuc-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('✅ Backup salvo!');
};
window.importBackup=input=>{
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{ try{ const p=JSON.parse(e.target.result); if(!p.semanas&&!p.variaveis)throw new Error(); if(!confirm('Substituir dados atuais pelo backup?'))return; DB={cfg:{...defCfg(),...p.cfg,lem:{...defCfg().lem,...(p.cfg?.lem||{})}},semanas:p.semanas||[],variaveis:p.variaveis||[]}; save(); applyTheme(); render(); showToast('✅ Backup restaurado!'); }catch(e){alert('Arquivo inválido.');} };
  reader.readAsText(file); input.value='';
};

// ═══════════ PDF ══════════════════════════════════════════════════
function gerarPDF(){
  const cx=compute(),c=DB.cfg,win=window.open('','_blank');
  const sRows=cx.semMes.map((s,i)=>`<tr><td>Sem.${i+1}</td><td>${s.data}</td><td>${s.dias}d</td><td>${(+s.pkts||0).toLocaleString('pt-BR')}</td><td>${R$(s.fixoTotal)}</td><td>${R$(s.pedPago)}</td><td>${R$(s.valPkts)}</td><td>${R$(s.custoMot)}</td><td><b>${R$(s.total)}</b></td></tr>`).join('');
  const vRows=cx.varMes.map(v=>`<tr><td>${CATS[v.cat]||'📌'} ${v.cat}</td><td>${v.data}</td><td colspan="6">${v.obs||'—'}</td><td><b style="color:#e11d48">${R$(v.valor)}</b></td></tr>`).join('');
  win.document.write(`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório ${mALbl(cx.ma)}</title><style>body{font-family:sans-serif;padding:24px;color:#1a202c;max-width:1000px;margin:0 auto;font-size:13px}h1{color:#f05a28;font-size:20px;margin-bottom:2px}h2{color:#64748b;font-size:13px;margin-bottom:20px;font-weight:400}h3{font-size:14px;margin:20px 0 8px}.kpis{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}.kbox{flex:1;min-width:100px;background:#f8fafc;border-radius:10px;padding:12px;border:1px solid #e2e8f0}.klbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.05em}.kval{font-size:16px;font-weight:800;margin-top:4px}.gn{color:#16a34a}.rd{color:#e11d48}.ac{color:#f05a28}.bl{color:#2563eb}table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:12px}th{background:#f0f4f8;padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em}td{padding:7px 8px;border-bottom:1px solid #e2e8f0}@media print{button{display:none}}</style></head><body>
  <h1>🚛 Gestão Shopee VUC — Relatório Mensal</h1><h2>${mALbl(cx.ma)} · Jundiaí/SP · ${cx.totDias} dias trabalhados</h2>
  <div class="kpis"><div class="kbox"><div class="klbl">Receita Bruta</div><div class="kval gn">${R$(cx.recBruta)}</div></div><div class="kbox"><div class="klbl">Motorista</div><div class="kval bl">${R$(cx.custoMot)}</div></div><div class="kbox"><div class="klbl">Fixas</div><div class="kval rd">${R$(cx.totalFixas)}</div></div><div class="kbox"><div class="klbl">Variáveis</div><div class="kval rd">${R$(cx.totalVar)}</div></div><div class="kbox"><div class="klbl">Total Desp.</div><div class="kval rd">${R$(cx.totalDesp)}</div></div><div class="kbox"><div class="klbl">Lucro</div><div class="kval ${cx.lucro>=0?'gn':'rd'}">${R$(cx.lucro)}</div></div><div class="kbox"><div class="klbl">Pacotes</div><div class="kval ac">${(cx.totPkts||0).toLocaleString('pt-BR')}</div></div></div>
  <h3>Entradas Semanais</h3><table><thead><tr><th>#</th><th>Data</th><th>Dias</th><th>Pacotes</th><th>Fixo</th><th>Pedágio</th><th>Val.Pkts</th><th>Motorista</th><th>Total</th></tr></thead><tbody>${sRows||'<tr><td colspan="9">Nenhum lançamento.</td></tr>'}</tbody></table>
  <h3>Despesas Variáveis</h3><table><thead><tr><th>Categoria</th><th>Data</th><th colspan="6">Obs</th><th>Valor</th></tr></thead><tbody>${vRows||'<tr><td colspan="9">Nenhuma.</td></tr>'}</tbody></table>
  <h3>Despesas Fixas</h3><table><thead><tr><th>Item</th><th colspan="7"></th><th>Valor</th></tr></thead><tbody><tr><td>Financiamento/Aluguel</td><td colspan="7"></td><td>${R$(c.financiamento)}</td></tr><tr><td>Seguro</td><td colspan="7"></td><td>${R$(c.seguro)}</td></tr>${(c.fixasExtras||[]).map(f=>`<tr><td>${f.nome}</td><td colspan="7"></td><td>${R$(f.valor)}</td></tr>`).join('')}<tr style="font-weight:800"><td>TOTAL</td><td colspan="7"></td><td style="color:#e11d48">${R$(cx.totalFixas)}</td></tr></tbody></table>
  <button onclick="window.print()" style="background:#f05a28;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer">🖨️ Imprimir / Salvar PDF</button>
  </body></html>`); win.document.close();
}

// ═══════════ TOAST ════════════════════════════════════════════════
function showToast(msg){ const t=document.createElement('div'); t.textContent=msg; t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1c1f27;color:#eef0f4;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:2000;border:1px solid #272b36;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)'; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }

// ═══════════ RENDER ═══════════════════════════════════════════════
function empty(t){ return `<div class="empty"><div style="font-size:44px;margin-bottom:10px">📭</div><p style="font-size:14px">${t}</p></div>`; }
window.render=function render(){
  const c=document.getElementById('cnt'); if(!c)return;
  if(TAB==='dash') c.innerHTML=renderDash();
  if(TAB==='ent')  c.innerHTML=renderEnt();
  if(TAB==='desp') c.innerHTML=renderDesp();
  if(TAB==='cfg')  c.innerHTML=renderCfg();
}
</script>
