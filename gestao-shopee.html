<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>Gestão Shopee VUC</title>
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#0d0f13;--sf:#1c1f27;--s2:#21252e;--bd:#272b36;--tx:#eef0f4;--t2:#7a8294;--ac:#f05a28;--gn:#34d399;--rd:#f43f5e;--yw:#fbbf24;--bl:#60a5fa}
.light{--bg:#f0f4f8;--sf:#fff;--s2:#f8fafc;--bd:#e2e8f0;--tx:#1a202c;--t2:#64748b;--gn:#16a34a;--rd:#e11d48;--yw:#d97706;--bl:#2563eb}
body{background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--tx);min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--bd);border-radius:4px}
input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
input:focus,select:focus{border-color:var(--ac)!important;outline:none}

/* ── LOGIN ──────────────────────────────────────────────────────── */
#login-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:32px 24px}
.login-logo{width:88px;height:88px;border-radius:24px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:44px;margin-bottom:24px;box-shadow:0 16px 40px rgba(240,90,40,.35)}
.login-title{font-size:28px;font-weight:800;font-family:'Sora',sans-serif;color:var(--tx);text-align:center;margin-bottom:8px}
.login-sub{font-size:14px;color:var(--t2);text-align:center;margin-bottom:40px;line-height:1.6;max-width:300px}
.google-btn{display:flex;align-items:center;gap:12px;background:#fff;color:#1a202c;border:none;border-radius:14px;padding:14px 28px;font-size:15px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;box-shadow:0 4px 20px rgba(0,0,0,.15);transition:.2s;width:100%;max-width:300px;justify-content:center}
.google-btn:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(0,0,0,.22)}
.login-version{font-size:11px;color:var(--t2);margin-top:32px}

/* ── LAYOUT DESKTOP ─────────────────────────────────────────────── */
#app{display:none;min-height:100vh;flex-direction:column}
#app.visible{display:flex}

/* Sidebar (desktop) */
#sidebar{display:none;width:240px;min-height:100vh;background:var(--sf);border-right:1px solid var(--bd);flex-direction:column;position:fixed;top:0;left:0;z-index:100;padding:0}
.sb-header{padding:20px 20px 16px;border-bottom:1px solid var(--bd)}
.sb-logo{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.sb-logo-box{width:36px;height:36px;border-radius:10px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo-tx{font-size:13px;font-weight:800;font-family:'Sora',sans-serif;color:var(--tx);line-height:1.2}
.sb-logo-sb{font-size:10px;color:var(--t2)}
.sb-user{display:flex;align-items:center;gap:8px;padding:10px 12px;background:var(--s2);border-radius:10px}
.sb-avatar{width:32px;height:32px;border-radius:50%;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:#fff;flex-shrink:0;overflow:hidden}
.sb-avatar img{width:100%;height:100%;object-fit:cover}
.sb-uname{font-size:12px;font-weight:600;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-uemail{font-size:10px;color:var(--t2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-nav{padding:12px 12px;flex:1}
.sb-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;cursor:pointer;margin-bottom:4px;border:none;background:none;width:100%;text-align:left;color:var(--t2);font-size:13px;font-weight:600;font-family:'DM Sans',sans-serif;transition:.15s}
.sb-nav-item:hover{background:var(--s2);color:var(--tx)}
.sb-nav-item.active{background:rgba(240,90,40,.12);color:var(--ac)}
.sb-nav-icon{font-size:18px;flex-shrink:0}
.sb-bottom{padding:12px;border-top:1px solid var(--bd)}
.sb-signout{display:flex;align-items:center;gap:8px;padding:9px 12px;border-radius:10px;cursor:pointer;border:none;background:none;width:100%;color:var(--t2);font-size:12px;font-weight:600;font-family:'DM Sans',sans-serif;transition:.15s}
.sb-signout:hover{background:rgba(244,63,94,.08);color:var(--rd)}

/* Main content area */
#main-wrap{display:flex;flex:1;min-height:100vh}
#content-area{flex:1;padding:24px;overflow-y:auto;min-height:100vh}

/* Mobile header */
#mob-hdr{display:flex;align-items:center;justify-content:space-between;padding:13px 16px;background:var(--sf);border-bottom:1px solid var(--bd);position:sticky;top:0;z-index:200;backdrop-filter:blur(12px)}
.light #mob-hdr{background:rgba(255,255,255,.96)}
.mob-logo{display:flex;align-items:center;gap:8px}
.mob-logo-box{width:34px;height:34px;border-radius:10px;background:var(--ac);display:flex;align-items:center;justify-content:center;font-size:18px}
.mob-logo-tx{font-size:14px;font-weight:800;font-family:'Sora',sans-serif;color:var(--tx)}
.mob-logo-sb{font-size:10px;color:var(--t2)}
.mob-actions{display:flex;gap:8px;align-items:center}
.icon-btn{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:7px 11px;cursor:pointer;font-size:16px;color:var(--tx)}

/* Bottom nav (mobile) */
#mob-nav{display:flex;position:fixed;bottom:0;left:0;right:0;background:rgba(28,31,39,.97);backdrop-filter:blur(14px);border-top:1px solid var(--bd);z-index:200}
.light #mob-nav{background:rgba(255,255,255,.97)}
.nb{flex:1;padding:9px 4px 11px;background:none;border:none;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:3px;border-top:2.5px solid transparent;color:var(--t2);transition:.15s}
.nb.active{border-color:var(--ac);color:var(--ac)}
.ni{font-size:20px;line-height:1}.nl{font-size:10px;font-weight:600;font-family:'Sora',sans-serif;letter-spacing:.03em}

/* Desktop show/hide */
@media(min-width:768px){
  #sidebar{display:flex}
  #mob-hdr{display:none}
  #mob-nav{display:none}
  #content-area{margin-left:240px;padding:28px 32px;padding-bottom:28px}
  #cnt{max-width:1100px;margin:0 auto}
}
@media(max-width:767px){
  #content-area{padding:16px 14px 90px}
}

/* ── CARDS ──────────────────────────────────────────────────────── */
.card{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:20px;margin-bottom:16px}
.ct{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px}

/* KPI grid */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
@media(min-width:768px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi{background:var(--sf);border:1px solid var(--bd);border-radius:16px;padding:16px;border-left:3px solid}
.ki{font-size:22px;margin-bottom:6px}
.kl{font-size:10px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em}
.kv{font-size:17px;font-weight:800;font-family:'Sora',sans-serif;margin:5px 0 3px;line-height:1.2}
.ks{font-size:10px;color:var(--t2)}

/* 2-col desktop layout */
.two-col{display:grid;grid-template-columns:1fr;gap:16px}
@media(min-width:768px){.two-col{grid-template-columns:1fr 1fr}}

/* Buttons */
.btn{background:var(--ac);color:#fff;border:none;border-radius:10px;padding:12px 20px;font-size:14px;font-weight:700;cursor:pointer;font-family:'Sora',sans-serif;width:100%;transition:.15s}
.btn:active{opacity:.8}
.bsm{padding:8px 16px;font-size:12px;border-radius:8px;width:auto}
.brd{background:var(--rd)}.bgh{background:var(--s2);color:var(--tx);border:1.5px solid var(--bd)}

/* Rows / items */
.row{display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-bottom:1px solid var(--bd)}
.row:last-child{border-bottom:none}
.rl{font-size:13px;color:var(--t2)}.rv{font-size:13px;font-weight:700;color:var(--tx)}
.item{display:flex;justify-content:space-between;align-items:flex-start;padding:11px 14px;border-radius:10px;margin-bottom:8px;background:var(--s2);border:1px solid var(--bd)}
.itx{font-size:13px;font-weight:600;color:var(--tx)}.isb{font-size:11px;color:var(--t2);margin-top:3px;line-height:1.5}

/* Form */
.fld{margin-bottom:14px}
.lbl{display:block;font-size:11px;font-weight:700;color:var(--t2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.inp{width:100%;padding:11px 13px;border-radius:10px;font-size:14px;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx);font-family:'DM Sans',sans-serif}
.inp-row{display:flex;gap:10px}
.inp-row .fld{flex:1;margin-bottom:0}

/* Days picker */
.days-pick{display:flex;gap:6px;margin-top:4px}
.day-btn{flex:1;padding:10px 4px;border-radius:8px;border:1.5px solid var(--bd);background:var(--s2);color:var(--t2);cursor:pointer;font-size:12px;font-weight:600;font-family:'Sora',sans-serif;text-align:center;transition:.15s}
.day-btn.on{border-color:var(--ac);background:rgba(240,90,40,.12);color:var(--ac);font-weight:700}

/* Modal */
#ov{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,.65);backdrop-filter:blur(6px);align-items:flex-end;justify-content:center}
#ov.open{display:flex}
@media(min-width:768px){#ov{align-items:center}}
#mb{background:var(--sf);border:1px solid var(--bd);border-radius:20px 20px 0 0;padding:8px 0 0;width:100%;max-width:520px;max-height:93vh;overflow-y:auto;animation:up .25s cubic-bezier(.4,0,.2,1)}
@media(min-width:768px){#mb{border-radius:20px;max-height:88vh}}
@keyframes up{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
.drag{width:36px;height:4px;border-radius:2px;background:var(--bd);margin:0 auto 16px}
@media(min-width:768px){.drag{display:none}}
.mi{padding:0 22px 32px}
.mh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.mt{font-size:17px;font-weight:800;font-family:'Sora',sans-serif;color:var(--tx)}
.mc{background:var(--s2);border:none;border-radius:8px;width:32px;height:32px;cursor:pointer;font-size:18px;color:var(--t2);display:flex;align-items:center;justify-content:center}

/* Calc box */
.cbox{background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:14px}
.crow{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;color:var(--t2)}
.crow b{color:var(--tx)}
.ctot{border-top:1px solid var(--bd);margin-top:6px;padding-top:10px;font-weight:800;font-size:14px;color:var(--tx)}

/* Charts */
.chw{display:flex;align-items:flex-end;gap:6px;height:64px}
.cbw{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px}
.cb{width:100%;border-radius:4px;background:var(--ac);transition:height .5s cubic-bezier(.4,0,.2,1)}
.clb{font-size:9px;color:var(--t2)}
@media(min-width:768px){.chw{height:80px}}

/* Alerts */
.alrt{border-radius:12px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:flex-start;gap:10px}
.aicon{font-size:20px;flex-shrink:0;margin-top:1px}
.atitle{font-size:13px;font-weight:700}.asub{font-size:11px;margin-top:2px;opacity:.85}
.a-or{background:rgba(240,90,40,.1);border:1px solid rgba(240,90,40,.25);color:var(--ac)}
.a-rd{background:rgba(244,63,94,.1);border:1px solid rgba(244,63,94,.25);color:var(--rd)}
.a-yw{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.25);color:var(--yw)}
.a-bl{background:rgba(96,165,250,.1);border:1px solid rgba(96,165,250,.25);color:var(--bl)}

/* Toggle */
.trow{display:flex;justify-content:space-between;align-items:center;padding:11px 0;border-bottom:1px solid var(--bd);flex-wrap:wrap;gap:8px}
.trow:last-child{border-bottom:none}
.tog{position:relative;width:44px;height:24px;flex-shrink:0}
.tog input{opacity:0;width:0;height:0}
.sldr{position:absolute;cursor:pointer;inset:0;background:var(--bd);border-radius:99px;transition:.3s}
.sldr:before{content:'';position:absolute;width:18px;height:18px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.3s}
input:checked+.sldr{background:var(--ac)}
input:checked+.sldr:before{transform:translateX(20px)}

/* Proj bar */
.pbg{background:var(--bd);border-radius:99px;height:8px;overflow:hidden;margin:8px 0 4px}
.pfill{height:100%;border-radius:99px;background:var(--ac);transition:width .6s}

/* Sync indicator */
.sync-dot{width:8px;height:8px;border-radius:50%;background:var(--gn);display:inline-block;margin-right:4px}
.sync-dot.syncing{background:var(--yw);animation:pulse 1s infinite}
.sync-dot.error{background:var(--rd)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Colors */
.c-gn{color:var(--gn)}.c-rd{color:var(--rd)}.c-yw{color:var(--yw)}.c-ac{color:var(--ac)}.c-bl{color:var(--bl)}
.fw8{font-weight:800}.ff{font-family:'Sora',sans-serif}
.sh{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;flex-wrap:wrap;gap:10px}
.st{font-size:20px;font-weight:800;font-family:'Sora',sans-serif;color:var(--tx)}
.del{background:none;border:none;cursor:pointer;font-size:16px;color:var(--rd);padding:4px;flex-shrink:0}
.nfe-box{background:rgba(240,90,40,.07);border:1px solid rgba(240,90,40,.22);border-radius:16px;padding:16px;margin-bottom:16px}
.light .nfe-box{background:#fff5f0;border-color:#fcd9c8}
.empty{text-align:center;padding:48px 20px;color:var(--t2)}
.divider{font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin:0 0 10px}

/* Loading */
#loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:16px}
.spinner{width:40px;height:40px;border:3px solid var(--bd);border-top-color:var(--ac);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- Loading -->
<div id="loading">
  <div class="spinner"></div>
  <div style="font-size:13px;color:var(--t2);font-family:'Sora',sans-serif">Carregando...</div>
</div>

<!-- Login -->
<div id="login-screen" style="display:none">
  <div class="login-logo">🚛</div>
  <div class="login-title">Gestão Shopee VUC</div>
  <div class="login-sub">Sistema de gestão financeira para coletas Shopee · Jundiaí/SP</div>
  <button class="google-btn" onclick="loginGoogle()">
    <svg width="22" height="22" viewBox="0 0 48 48"><path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C12.955 4 4 12.955 4 24s8.955 20 20 20s20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/><path fill="#FF3D00" d="m6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4C16.318 4 9.656 8.337 6.306 14.691z"/><path fill="#4CAF50" d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238A11.91 11.91 0 0 1 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/><path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303a12.04 12.04 0 0 1-4.087 5.571l.003-.002l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/></svg>
    Entrar com Google
  </button>
  <div class="login-version">v5.0 · Firebase Cloud Sync</div>
</div>

<!-- App -->
<div id="app">
  <!-- Sidebar desktop -->
  <div id="sidebar">
    <div class="sb-header">
      <div class="sb-logo">
        <div class="sb-logo-box">🚛</div>
        <div><div class="sb-logo-tx">Gestão Shopee VUC</div><div class="sb-logo-sb">Jundiaí · SP</div></div>
      </div>
      <div class="sb-user">
        <div class="sb-avatar" id="sb-avatar">R</div>
        <div style="overflow:hidden">
          <div class="sb-uname" id="sb-uname">Usuário</div>
          <div class="sb-uemail" id="sb-uemail"></div>
        </div>
      </div>
    </div>
    <div class="sb-nav">
      <button class="sb-nav-item active" onclick="go('dash')" id="sb-dash"><span class="sb-nav-icon">📊</span> Painel</button>
      <button class="sb-nav-item" onclick="go('ent')" id="sb-ent"><span class="sb-nav-icon">📥</span> Entradas</button>
      <button class="sb-nav-item" onclick="go('desp')" id="sb-desp"><span class="sb-nav-icon">📤</span> Despesas</button>
      <button class="sb-nav-item" onclick="go('anal')" id="sb-anal"><span class="sb-nav-icon">🔍</span> Análise</button>
      <button class="sb-nav-item" onclick="go('cfg')" id="sb-cfg"><span class="sb-nav-icon">⚙️</span> Configurações</button>
    </div>
    <div class="sb-bottom">
      <div style="display:flex;align-items:center;gap:6px;padding:8px 12px;margin-bottom:6px">
        <span class="sync-dot" id="sync-dot"></span>
        <span style="font-size:11px;color:var(--t2)" id="sync-txt">Sincronizado</span>
      </div>
      <button class="sb-signout" onclick="logout()">🚪 Sair da conta</button>
    </div>
  </div>

  <!-- Mobile header -->
  <div id="mob-hdr">
    <div class="mob-logo">
      <div class="mob-logo-box">🚛</div>
      <div><div class="mob-logo-tx">Gestão Shopee VUC</div><div class="mob-logo-sb">Jundiaí · SP</div></div>
    </div>
    <div class="mob-actions">
      <span class="sync-dot" id="sync-dot-mob"></span>
      <button class="icon-btn" onclick="exportBackup()" title="Backup">💾</button>
      <button class="icon-btn" onclick="toggleTheme()">☀️</button>
    </div>
  </div>

  <!-- Content -->
  <div id="main-wrap">
    <div id="content-area">
      <div id="cnt"></div>
    </div>
  </div>

  <!-- Mobile nav -->
  <div id="mob-nav">
    <button class="nb active" onclick="go('dash')" id="nav-dash"><span class="ni">📊</span><span class="nl">Painel</span></button>
    <button class="nb" onclick="go('ent')" id="nav-ent"><span class="ni">📥</span><span class="nl">Entradas</span></button>
    <button class="nb" onclick="go('desp')" id="nav-desp"><span class="ni">📤</span><span class="nl">Despesas</span></button>
    <button class="nb" onclick="go('anal')" id="nav-anal"><span class="ni">🔍</span><span class="nl">Análise</span></button>
    <button class="nb" onclick="go('cfg')" id="nav-cfg"><span class="ni">⚙️</span><span class="nl">Config</span></button>
  </div>
</div>

<!-- Modal -->
<div id="ov" onclick="closeModal()">
  <div id="mb" onclick="event.stopPropagation()">
    <div class="drag"></div>
    <div class="mi" id="mi"></div>
  </div>
</div>

<input type="file" id="restore-input" accept=".json" style="display:none" onchange="importBackup(this)"/>

<!-- Firebase -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCCYjJ9qo8_rsSwIweRCJofpW-7VXDlgvU",
  authDomain: "gestao-shopee-vuc.firebaseapp.com",
  projectId: "gestao-shopee-vuc",
  storageBucket: "gestao-shopee-vuc.firebasestorage.app",
  messagingSenderId: "1056199349311",
  appId: "1:1056199349311:web:0e464180a32a3a10ef948a"
};

const fireApp  = initializeApp(firebaseConfig);
const auth     = getAuth(fireApp);
const db       = getFirestore(fireApp);
const provider = new GoogleAuthProvider();

let currentUser = null;
let unsubSnap   = null;

// ── Auth ──────────────────────────────────────────────────────────
window.loginGoogle = async () => {
  try { await signInWithPopup(auth, provider); }
  catch(e){ alert('Erro ao fazer login: '+e.message); }
};
window.logout = async () => {
  if(!confirm('Sair da conta?')) return;
  if(unsubSnap) unsubSnap();
  await signOut(auth);
};

onAuthStateChanged(auth, user => {
  document.getElementById('loading').style.display = 'none';
  if(user){
    currentUser = user;
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('app').classList.add('visible');
    // Update sidebar user info
    document.getElementById('sb-uname').textContent = user.displayName || 'Usuário';
    document.getElementById('sb-uemail').textContent = user.email || '';
    const av = document.getElementById('sb-avatar');
    if(user.photoURL){ av.innerHTML=`<img src="${user.photoURL}" alt="">`; }
    else { av.textContent = (user.displayName||'U')[0].toUpperCase(); }
    if(window.applyTheme) window.applyTheme();
    subscribeData(user.uid);
  } else {
    currentUser = null;
    document.getElementById('login-screen').style.display = 'flex';
    document.getElementById('app').classList.remove('visible');
    if(unsubSnap){ unsubSnap(); unsubSnap=null; }
  }
});

// ── Firestore sync ────────────────────────────────────────────────
function subscribeData(uid){
  setSyncState('syncing');
  const ref = doc(db, 'users', uid);
  unsubSnap = onSnapshot(ref, snap => {
    if(snap.exists()){
      const remote = snap.data();
      DB.semanas   = remote.semanas   || [];
      DB.variaveis = remote.variaveis || [];
      DB.cfg       = { ...defCfg(), ...remote.cfg, lem:{...defCfg().lem,...(remote.cfg?.lem||{})} };
    }
    setSyncState('ok');
    if(window.applyTheme) window.applyTheme();
    if(window.render) window.render();
  }, err => { setSyncState('error'); console.error(err); });
}

window.saveDB = async () => {
  if(!currentUser) return;
  setSyncState('syncing');
  try {
    await setDoc(doc(db,'users',currentUser.uid), {
      semanas:   DB.semanas,
      variaveis: DB.variaveis,
      cfg:       DB.cfg
    });
    setSyncState('ok');
  } catch(e){ setSyncState('error'); console.error(e); }
};

function setSyncState(state){
  const dots = [document.getElementById('sync-dot'), document.getElementById('sync-dot-mob')];
  const txt  = document.getElementById('sync-txt');
  dots.forEach(d=>{ if(!d) return; d.className='sync-dot'+(state==='syncing'?' syncing':state==='error'?' error':''); });
  if(txt) txt.textContent = state==='syncing'?'Sincronizando...':state==='error'?'Erro ao salvar':'Sincronizado';
}
</script>

<script>
// ═══════════ DB ═══════════════════════════════════════════════════
function defCfg(){
  return { fixoDia:160, pedagioDia:30, pedagioShopee:35, valorPacote:0.50, diaria:120, valeRefeicaoDia:20, financiamento:1800, seguro:0, fixasExtras:[], tema:'dark', lem:{nfSeg:true,salario:true,ipva:true,ipvaMes:7,seguro:false,seguroVenc:'',revisao:true,revisaoMeses:3,revisaoUlt:''} };
}
let DB = { cfg:defCfg(), semanas:[], variaveis:[] };

// ═══════════ HELPERS ══════════════════════════════════════════════
const R$=v=>new Intl.NumberFormat('pt-BR',{style:'currency',currency:'BRL'}).format(v||0);
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().slice(0,10);
const MN=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
const MF=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
const CATS={'Combustível':'⛽','Manutenção':'🔧','Pneus/Peças':'🔩','IPVA/Licenciamento':'📋','Outros':'📌'};
function mAStr(ds){ if(!ds)return ''; const d=new Date(ds+'T12:00:00'); return String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function curMA(){ const d=new Date(); return String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear(); }
function mALbl(ma){ if(!ma)return ''; const[m,y]=ma.split('/'); return MN[parseInt(m)-1]+' '+y; }
function grpBy(arr){ const g={}; [...arr].reverse().forEach(x=>{ const k=mAStr(x.data); if(!g[k])g[k]=[]; g[k].push(x); }); return g; }
function save(){ if(window.saveDB) window.saveDB(); }

// ═══════════ THEME ════════════════════════════════════════════════
window.applyTheme=function(){ document.body.classList.toggle('light',DB.cfg.tema==='light'); const b=document.getElementById('tbtn-mob'); if(b) b.textContent=DB.cfg.tema==='dark'?'☀️':'🌙'; }
window.toggleTheme=()=>{ DB.cfg.tema=DB.cfg.tema==='dark'?'light':'dark'; save(); window.applyTheme(); };

// ═══════════ TABS ═════════════════════════════════════════════════
let TAB='dash';
window.go=t=>{
  TAB=t;
  ['dash','ent','desp','anal','cfg'].forEach(x=>{
    const m=document.getElementById('nav-'+x), s=document.getElementById('sb-'+x);
    if(m){ m.classList.toggle('active',x===t); }
    if(s){ s.classList.toggle('active',x===t); }
  });
  render(); window.scrollTo(0,0);
};

// ═══════════ COMPUTE ══════════════════════════════════════════════
function compute(ma){
  ma=ma||curMA();
  const c=DB.cfg, semMes=DB.semanas.filter(s=>mAStr(s.data)===ma), varMes=DB.variaveis.filter(v=>mAStr(v.data)===ma);
  const recBruta=semMes.reduce((a,s)=>a+(+s.total||0),0), totPkts=semMes.reduce((a,s)=>a+(+s.pkts||0),0);
  const totDias=semMes.reduce((a,s)=>a+(+s.dias||0),0), custoMot=semMes.reduce((a,s)=>a+(+s.custoMot||0),0);
  const totalFixas=(+c.financiamento||0)+(+c.seguro||0)+(c.fixasExtras||[]).reduce((a,x)=>a+(+x.valor||0),0);
  const totalVar=varMes.reduce((a,v)=>a+(+v.valor||0),0), totalDesp=totalFixas+totalVar+custoMot;
  const lucro=recBruta-totalDesp, custoPkt=totPkts>0?totalDesp/totPkts:0;
  const semCont=semMes.length, mediaRec=semCont>0?recBruta/semCont:0, proj=mediaRec*4.3;
  return {ma,semMes,varMes,recBruta,totPkts,totDias,custoMot,totalFixas,totalVar,totalDesp,lucro,custoPkt,semCont,proj};
}
function calcSem(total,dias,pedagio){
  const c=DB.cfg, d=+dias||0;
  const fixoTotal  = (+c.fixoDia||0)*d;
  const pedShopee  = (+c.pedagioShopee||0)*d;
  const pedPago    = +pedagio||0;
  const valPkts    = Math.max(0,(+total||0)-fixoTotal-pedShopee);
  const pkts       = (+c.valorPacote||0.5)>0?Math.round(valPkts/(+c.valorPacote||0.5)):0;
  const sobraPed   = pedShopee - pedPago;
  const custoMot   = ((+c.diaria||0)+(+c.valeRefeicaoDia||0))*d;
  const check      = Math.abs(fixoTotal+pedShopee+valPkts-(+total||0))<0.02;
  return {fixoTotal,pedShopee,pedPago,valPkts,pkts,sobraPed,custoMot,check};
}

// ═══════════ ALERTS ═══════════════════════════════════════════════
function getAlerts(){
  const al=[],l=DB.cfg.lem||{},now=new Date(),dow=now.getDay(),dom=now.getDate(),mes=now.getMonth()+1;

  if(l.revisao&&l.revisaoUlt){const ult=new Date(l.revisaoUlt+'T12:00:00'),prox=new Date(ult);prox.setMonth(prox.getMonth()+(+l.revisaoMeses||3));const diff=Math.ceil((prox-now)/86400000);if(diff<0) al.push({tp:'a-rd',icon:'🔧',title:'Revisão atrasada!',sub:`Prevista: ${prox.toLocaleDateString('pt-BR')}`});else if(diff<=15) al.push({tp:'a-yw',icon:'🔧',title:`Revisão em ${diff} dia(s)`,sub:`Próxima: ${prox.toLocaleDateString('pt-BR')}`});}
  return al;
}

// ═══════════ CHARTS ═══════════════════════════════════════════════
function chartReceita(){
  const vs=Array.from({length:6},(_,i)=>{const d=new Date();d.setMonth(d.getMonth()-(5-i));const k=String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();return{label:MN[d.getMonth()],val:DB.semanas.filter(s=>mAStr(s.data)===k).reduce((a,s)=>a+(+s.total||0),0)};});
  const max=Math.max(...vs.map(v=>v.val),1);
  return vs.map((v,i)=>`<div class="cbw"><div class="cb" style="height:${Math.max(4,(v.val/max)*58)}px;opacity:${i===5?1:.35}"></div><span class="clb">${v.label}</span></div>`).join('');
}
function chartPacotes(){
  const vs=Array.from({length:6},(_,i)=>{const d=new Date();d.setMonth(d.getMonth()-(5-i));const k=String(d.getMonth()+1).padStart(2,'0')+'/'+d.getFullYear();return{label:MN[d.getMonth()],val:DB.semanas.filter(s=>mAStr(s.data)===k).reduce((a,s)=>a+(+s.pkts||0),0)};});
  const max=Math.max(...vs.map(v=>v.val),1);
  return vs.map((v,i)=>`<div class="cbw"><div style="font-size:8px;color:var(--yw);margin-bottom:2px;text-align:center;min-height:10px">${v.val>0?(v.val>999?(v.val/1000).toFixed(1)+'k':v.val):''}</div><div class="cb" style="height:${Math.max(4,(v.val/max)*48)}px;background:var(--yw);opacity:${i===5?1:.35}"></div><span class="clb">${v.label}</span></div>`).join('');
}

// ═══════════ CONFIG ═══════════════════════════════════════════════

function togAd(v){ const el=document.getElementById('wrap-ad'); if(el) el.style.display=v==='quinzenal'?'block':'none'; }
function scf(f,v){ DB.cfg[f]=isNaN(+v)||v===''?v:+v; save(); }
function sl(f,v){ if(!DB.cfg.lem) DB.cfg.lem={}; DB.cfg.lem[f]=v; save(); }
function addExtra(){ const n=document.getElementById('ex-n')?.value.trim(),v=document.getElementById('ex-v')?.value; if(!n||!v)return; if(!DB.cfg.fixasExtras)DB.cfg.fixasExtras=[]; DB.cfg.fixasExtras.push({nome:n,valor:+v}); save(); refreshExtras(); document.getElementById('ex-n').value=''; document.getElementById('ex-v').value=''; }
function remExtra(i){ DB.cfg.fixasExtras.splice(i,1); save(); refreshExtras(); }
function refreshExtras(){ const el=document.getElementById('extras-list'); if(!el)return; el.innerHTML=(DB.cfg.fixasExtras||[]).map((f,i)=>`<div class="item"><div style="flex:1"><div class="itx">${f.nome}</div></div><div style="display:flex;align-items:center;gap:8px"><span class="fw8 c-rd">${R$(f.valor)}</span><button class="del" onclick="remExtra(${i})">🗑</button></div></div>`).join(''); }

window.openModal=(t,extra)=>{ const mi=document.getElementById('mi'); selDias=5; if(t==='sem') mi.innerHTML=modalSem(); if(t==='var') mi.innerHTML=modalVar(); if(t==='rota') mi.innerHTML=modalRota(); if(t==='editRota') mi.innerHTML=modalRota(extra); document.getElementById('ov').classList.add('open'); if(t==='anal') setTimeout(calcSim,50); };
window.closeModal=()=>document.getElementById('ov').classList.remove('open');

function modalSem(s){
  const c=DB.cfg, dias=['Seg','Ter','Qua','Qui','Sex','Sáb'], isEdit=!!s;
  if(s) selDias=s.dias||5;
  const pedDia=s?(s.pedDia||(s.dias>0?Math.round(s.pedPago/s.dias):0)):(c.pedagioDia||0);
  return `
    <div class="mh"><span class="mt">${isEdit?'Editar Semana':'Lançar Semana'}</span><button class="mc" onclick="closeModal()">×</button></div>
    <div class="fld"><label class="lbl">Data de fechamento da semana</label><input class="inp" type="date" id="ms-data" value="${s?s.data:today()}"></div>
    <div class="fld">
      <label class="lbl">Dias trabalhados nesta semana</label>
      <div class="days-pick">${dias.map((d,i)=>`<button class="day-btn${(isEdit?i<selDias:i<5)?' on':''}" id="day-${i}" onclick="togDay(${i})">${d}</button>`).join('')}</div>
      <div style="font-size:12px;color:var(--t2);margin-top:8px;text-align:center">
        <span id="dias-count" class="fw8 c-ac">${selDias} dias</span> trabalhados · Fixo <span id="dias-fixo" class="c-gn fw8">${R$((c.fixoDia||0)*selDias)}</span> · Motorista <span id="dias-mot" class="c-bl fw8">${R$(((c.diaria||0)+(c.valeRefeicaoDia||0))*selDias)}</span>
      </div>
    </div>
    <div class="fld"><label class="lbl">Pedágio gasto por dia (R$)</label><input class="inp" type="number" id="ms-ped-dia" value="${pedDia}" oninput="prevSem()"><div style="font-size:11px;color:var(--t2);margin-top:5px">Total = valor/dia × dias trabalhados ✓</div></div>
    <div class="fld"><label class="lbl">Valor total recebido da Shopee (R$)</label><input class="inp" type="number" id="ms-tot" value="${s?s.total:''}" placeholder="Copie do app da Shopee" style="font-size:18px;font-weight:700" oninput="prevSem()"></div>
    <div id="ms-prev" style="display:none">
      <div class="cbox">
        <div style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">📊 Cálculo automático</div>
        <div class="crow"><span>Total recebido</span><b id="pv-tot"></b></div>
        <div class="crow"><span>− Fixo de saída (<span id="pv-dias-txt"></span> dias)</span><span id="pv-fixo" class="c-rd"></span></div>
        <div class="crow"><span>− Pedágio Shopee (<span id="pv-dias-txt2"></span>)</span><span id="pv-ped" class="c-rd"></span></div>
        <div class="crow ctot"><span>= Valor dos pacotes</span><span id="pv-vpkt" class="c-gn"></span></div>
        <div style="margin-top:8px;padding:8px 10px;border-radius:8px;background:rgba(251,191,36,.08);border:1px solid rgba(251,191,36,.2)">
          <div class="crow" style="padding:2px 0"><span style="font-size:12px;color:var(--yw)">Pedágio que você gastou</span><span id="pv-ped-gasto" class="fw8" style="color:var(--yw)"></span></div>
          <div class="crow" style="padding:2px 0"><span style="font-size:12px;color:var(--yw)">💛 Sobra de pedágio</span><span id="pv-sob" class="fw8 c-yw"></span></div>
        </div>
        <div style="margin-top:10px;padding-top:10px;border-top:1px solid var(--bd)">
          <div class="crow"><span>📦 Pacotes coletados</span><span id="pv-pkts" class="fw8 c-ac" style="font-size:16px"></span></div>
          <div class="crow"><span>💛 Sobra de pedágio</span><span id="pv-sob" class="fw8 c-yw"></span></div>

        </div>
        <div id="pv-chk" style="margin-top:10px;font-size:12px;font-weight:700;text-align:center;padding:8px;border-radius:8px"></div>

function togDay(i){
  const btn=document.getElementById('day-'+i); if(!btn)return;
  btn.classList.toggle('on'); selDias=document.querySelectorAll('.day-btn.on').length;
  const c=DB.cfg;
  const dEl=document.getElementById('dias-count'); if(dEl) dEl.textContent=selDias+' dia'+(selDias!==1?'s':'');
  const fEl=document.getElementById('dias-fixo');  if(fEl) fEl.textContent=R$((c.fixoDia||0)*selDias);
  const mEl=document.getElementById('dias-mot');   if(mEl) mEl.textContent=R$(((c.diaria||0)+(c.valeRefeicaoDia||0))*selDias);
  prevSem();
}
function prevSem(){
  const tot=parseFloat(document.getElementById('ms-tot')?.value)||0, pedDia=parseFloat(document.getElementById('ms-ped-dia')?.value)||0, ped=pedDia*selDias;
  const pv=document.getElementById('ms-prev'); if(!pv)return;
  if(tot<=0){pv.style.display='none';return;}
  pv.style.display='block';
  const cx=calcSem(tot,selDias,ped);
  document.getElementById('pv-tot').textContent=R$(tot);
  document.getElementById('pv-dias-txt').textContent=selDias;
  const dt2=document.getElementById('pv-dias-txt2'); if(dt2) dt2.textContent=selDias+'d';
  document.getElementById('pv-fixo').textContent='− '+R$(cx.fixoTotal);
  document.getElementById('pv-ped').textContent='− '+R$(cx.pedShopee)+' (Shopee: '+selDias+'d × '+R$(DB.cfg.pedagioShopee||0)+')';
  document.getElementById('pv-ped-gasto').textContent=R$(cx.pedPago)+' ('+selDias+'d × '+R$(pedDia)+')';
  document.getElementById('pv-vpkt').textContent=R$(cx.valPkts);
  document.getElementById('pv-pkts').textContent=cx.pkts.toLocaleString('pt-BR')+' pacotes';
  document.getElementById('pv-sob').textContent=R$(cx.sobraPed);
  // sob already set
  document.getElementById('pv-mot').textContent=R$(cx.custoMot);
  const chk=document.getElementById('pv-chk');
  chk.textContent=cx.check?'✔ Conta fechando corretamente':'⚠ Verifique: a soma não fecha com o total';
  chk.style.cssText=`margin-top:10px;font-size:12px;font-weight:700;text-align:center;padding:8px;border-radius:8px;background:${cx.check?'rgba(52,211,153,.1)':'rgba(244,63,94,.1)'};color:${cx.check?'var(--gn)':'var(--rd)'}`;
}
function saveSem(){
  const tot=parseFloat(document.getElementById('ms-tot')?.value)||0, pedDia=parseFloat(document.getElementById('ms-ped-dia')?.value)||0, ped=pedDia*selDias;
  const data=document.getElementById('ms-data')?.value, obs=document.getElementById('ms-obs')?.value||'';
  if(!tot){alert('Informe o valor total recebido.');return;}
  if(selDias===0){alert('Selecione ao menos um dia trabalhado.');return;}
  const cx=calcSem(tot,selDias,ped);
  DB.semanas.push({id:uid(),data,total:tot,dias:selDias,pedDia,pedShopee:cx.pedShopee,pedPago:cx.pedPago,fixoTotal:cx.fixoTotal,valPkts:cx.valPkts,pkts:cx.pkts,sobraPed:cx.sobraPed,custoMot:cx.custoMot,obs});
  save(); closeModal(); render();
}
window.editSem=id=>{ const s=DB.semanas.find(x=>x.id===id); if(!s)return; document.getElementById('mi').innerHTML=modalSem(s); document.getElementById('ov').classList.add('open'); setTimeout(prevSem,50); };
window.updateSem=id=>{
  const tot=parseFloat(document.getElementById('ms-tot')?.value)||0, pedDia=parseFloat(document.getElementById('ms-ped-dia')?.value)||0, ped=pedDia*selDias;
  const data=document.getElementById('ms-data')?.value, obs=document.getElementById('ms-obs')?.value||'';
  if(!tot){alert('Informe o valor total recebido.');return;}
  const cx=calcSem(tot,selDias,ped), idx=DB.semanas.findIndex(x=>x.id===id); if(idx<0)return;
  DB.semanas[idx]={id,data,total:tot,dias:selDias,pedDia,pedShopee:cx.pedShopee,pedPago:cx.pedPago,fixoTotal:cx.fixoTotal,valPkts:cx.valPkts,pkts:cx.pkts,sobraPed:cx.sobraPed,custoMot:cx.custoMot,obs};
  save(); closeModal(); render(); showToast('✅ Lançamento atualizado!');
};

function chkNovaCat(){ const v=document.getElementById('mv-cat')?.value; const el=document.getElementById('mv-nw'); if(el) el.style.display=v==='__nova'?'block':'none'; }
function saveVar(){
  const catSel=document.getElementById('mv-cat')?.value, cat=catSel==='__nova'?(document.getElementById('mv-nova')?.value||'Outros'):catSel;

window.delSem=id=>{ if(!confirm('Excluir este lançamento?'))return; DB.semanas=DB.semanas.filter(s=>s.id!==id); save(); render(); };

// ═══════════ BACKUP ═══════════════════════════════════════════════
window.exportBackup=()=>{
  const json=JSON.stringify(DB,null,2), blob=new Blob([json],{type:'application/json'}), url=URL.createObjectURL(blob), a=document.createElement('a');
  a.href=url; a.download=`shopee-vuc-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
  showToast('✅ Backup salvo!');
};
window.importBackup=input=>{
  const file=input.files[0]; if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{ try{ const p=JSON.parse(e.target.result); if(!p.semanas&&!p.variaveis)throw new Error(); if(!confirm('Substituir dados atuais pelo backup?'))return; DB={cfg:{...defCfg(),...p.cfg,lem:{...defCfg().lem,...(p.cfg?.lem||{})}},semanas:p.semanas||[],variaveis:p.variaveis||[]}; save(); applyTheme(); render(); showToast('✅ Backup restaurado!'); }catch(e){alert('Arquivo inválido.');} };
  reader.readAsText(file); input.value='';
};

function gerarPDF(){
  const cx=compute(),c=DB.cfg,win=window.open('','_blank');
  const sRows=cx.semMes.map((s,i)=>`<tr><td>Sem.${i+1}</td><td>${s.data}</td><td>${s.dias}d</td><td>${(+s.pkts||0).toLocaleString('pt-BR')}</td><td>${R$(s.fixoTotal)}</td><td>${R$(s.pedPago)}</td><td>${R$(s.valPkts)}</td><td>${R$(s.custoMot)}</td><td><b>${R$(s.total)}</b></td></tr>`).join('');
  const vRows=cx.varMes.map(v=>`<tr><td>${CATS[v.cat]||'📌'} ${v.cat}</td><td>${v.data}</td><td colspan="6">${v.obs||'—'}</td><td><b style="color:#e11d48">${R$(v.valor)}</b></td></tr>`).join('');
  win.document.write(`<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"><title>Relatório ${mALbl(cx.ma)}</title><style>body{font-family:sans-serif;padding:24px;color:#1a202c;max-width:1000px;margin:0 auto;font-size:13px}h1{color:#f05a28;font-size:20px;margin-bottom:2px}h2{color:#64748b;font-size:13px;margin-bottom:20px;font-weight:400}h3{font-size:14px;margin:20px 0 8px}.kpis{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px}.kbox{flex:1;min-width:100px;background:#f8fafc;border-radius:10px;padding:12px;border:1px solid #e2e8f0}.klbl{font-size:10px;color:#64748b;text-transform:uppercase;letter-spacing:.05em}.kval{font-size:16px;font-weight:800;margin-top:4px}.gn{color:#16a34a}.rd{color:#e11d48}.ac{color:#f05a28}.bl{color:#2563eb}table{width:100%;border-collapse:collapse;margin-bottom:16px;font-size:12px}th{background:#f0f4f8;padding:7px 8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.04em}td{padding:7px 8px;border-bottom:1px solid #e2e8f0}@media print{button{display:none}}</style></head><body>
  <h1>🚛 Gestão Shopee VUC — Relatório Mensal</h1><h2>${mALbl(cx.ma)} · Jundiaí/SP · ${cx.totDias} dias trabalhados</h2>
  <div class="kpis"><div class="kbox"><div class="klbl">Receita Bruta</div><div class="kval gn">${R$(cx.recBruta)}</div></div><div class="kbox"><div class="klbl">Motorista</div><div class="kval bl">${R$(cx.custoMot)}</div></div><div class="kbox"><div class="klbl">Fixas</div><div class="kval rd">${R$(cx.totalFixas)}</div></div><div class="kbox"><div class="klbl">Variáveis</div><div class="kval rd">${R$(cx.totalVar)}</div></div><div class="kbox"><div class="klbl">Total Desp.</div><div class="kval rd">${R$(cx.totalDesp)}</div></div><div class="kbox"><div class="klbl">Lucro</div><div class="kval ${cx.lucro>=0?'gn':'rd'}">${R$(cx.lucro)}</div></div><div class="kbox"><div class="klbl">Pacotes</div><div class="kval ac">${(cx.totPkts||0).toLocaleString('pt-BR')}</div></div></div>
  <h3>Entradas Semanais</h3><table><thead><tr><th>#</th><th>Data</th><th>Dias</th><th>Pacotes</th><th>Fixo</th><th>Pedágio</th><th>Val.Pkts</th><th>Motorista</th><th>Total</th></tr></thead><tbody>${sRows||'<tr><td colspan="9">Nenhum lançamento.</td></tr>'}</tbody></table>
  <h3>Despesas Variáveis</h3><table><thead><tr><th>Categoria</th><th>Data</th><th colspan="6">Obs</th><th>Valor</th></tr></thead><tbody>${vRows||'<tr><td colspan="9">Nenhuma.</td></tr>'}</tbody></table>
  <h3>Despesas Fixas</h3><table><thead><tr><th>Item</th><th colspan="7"></th><th>Valor</th></tr></thead><tbody><tr><td>Financiamento/Aluguel</td><td colspan="7"></td><td>${R$(c.financiamento)}</td></tr><tr><td>Seguro</td><td colspan="7"></td><td>${R$(c.seguro)}</td></tr>${(c.fixasExtras||[]).map(f=>`<tr><td>${f.nome}</td><td colspan="7"></td><td>${R$(f.valor)}</td></tr>`).join('')}<tr style="font-weight:800"><td>TOTAL</td><td colspan="7"></td><td style="color:#e11d48">${R$(cx.totalFixas)}</td></tr></tbody></table>
  <button onclick="window.print()" style="background:#f05a28;color:#fff;border:none;border-radius:8px;padding:10px 20px;font-size:13px;font-weight:700;cursor:pointer">🖨️ Imprimir / Salvar PDF</button>
  </body></html>`); win.document.close();
}

// ═══════════ ANÁLISE ══════════════════════════════════════════════
function renderAnal(){
  const c = DB.cfg;
  const rotas = DB.cfg.rotas || [];

  // ── Dados reais por rota ──────────────────────────────────────────
  function semanasDaRota(rota){
    if(!rota.dataInicio) return DB.semanas;
    return DB.semanas.filter(s => {
      if(!s.data) return false;
      const d = s.data;
      const apos = !rota.dataInicio || d >= rota.dataInicio;
      const antes = !rota.dataFim   || d <= rota.dataFim;
      return apos && antes;
    });
  }

  function statsRota(rota){
    const sems = semanasDaRota(rota);
    if(!sems.length) return null;
    const recTotal   = sems.reduce((a,s)=>a+(+s.total||0),0);
    const pktsTotal  = sems.reduce((a,s)=>a+(+s.pkts||0),0);
    const diasTotal  = sems.reduce((a,s)=>a+(+s.dias||0),0);
    const motTotal   = sems.reduce((a,s)=>a+(+s.custoMot||0),0);
    const semanas    = sems.length;
    const recMedia   = recTotal/semanas;
    const pktsMedia  = pktsTotal/semanas;
    const diasMedia  = diasTotal/semanas;
    // Custo fixo mensal pro-rata por semana (4.3 semanas/mês)
    const fixaMensal = (+c.financiamento||0)+(+c.seguro||0)+(c.fixasExtras||[]).reduce((a,x)=>a+(+x.valor||0),0);
    const fixaSem    = fixaMensal/4.3;
    const despTotal  = motTotal + (fixaSem*semanas);
    const lucroTotal = recTotal - despTotal;
    const lucroMedia = lucroTotal/semanas;
    const margem     = recTotal>0 ? (lucroTotal/recTotal)*100 : 0;
    // Ponto de equilíbrio
    const custoDiaMot = (+c.diaria||0)+(+c.valeRefeicaoDia||0);
    const diasMedSem  = diasMedia||5;
    const custoFixoSem= fixaSem + custoDiaMot*diasMedSem;
    const minPkts     = Math.ceil(custoFixoSem/(+c.valorPacote||0.5));
    const minReceita  = custoFixoSem + (+rota.fixoDia||c.fixoDia||0)*diasMedSem + (+rota.pedagioShopee||c.pedagioShopee||0)*diasMedSem;
    return {recTotal,pktsTotal,diasTotal,motTotal,semanas,recMedia,pktsMedia,diasMedia,despTotal,lucroTotal,lucroMedia,margem,minPkts,fixaSem,custoFixoSem};
  }

  // ── Bloco 0: sem rotas cadastradas ───────────────────────────────
  if(rotas.length === 0){
    return `
      <div class="sh"><div class="st">🔍 Análise de Rotas</div></div>
      <div class="card" style="text-align:center;padding:32px 20px">
        <div style="font-size:48px;margin-bottom:12px">🗺️</div>
        <div class="fw8 ff" style="font-size:17px;margin-bottom:8px">Nenhuma rota cadastrada ainda</div>
        <div style="font-size:13px;color:var(--t2);margin-bottom:20px;line-height:1.6">
          Cadastre suas rotas para ver o comparativo, simulador, diagnóstico e ponto de equilíbrio.
        </div>
        <button class="btn bsm" onclick="openModal('rota')">+ Cadastrar Rota</button>
      </div>`;
  }

  const statsArr = rotas.map(r => ({rota:r, stats:statsRota(r)}));
  const melhor   = statsArr.filter(x=>x.stats).sort((a,b)=>(b.stats.lucroMedia||0)-(a.stats.lucroMedia||0))[0];

  // ── Bloco 1: Comparativo ─────────────────────────────────────────
  const comparativo = `
    <div class="card">
      <div class="ct">📊 Comparativo de Rotas</div>
      <div style="display:grid;grid-template-columns:${rotas.map(()=>'1fr').join(' ')};gap:12px;margin-bottom:14px">
        ${rotas.map((r,i) => {
          const s = statsArr[i].stats;
          const isMelhor = melhor && melhor.rota.nome === r.nome && s;
          return `
            <div style="background:${isMelhor?'rgba(52,211,153,.07)':'var(--s2)'};border:1.5px solid ${isMelhor?'var(--gn)':'var(--bd)'};border-radius:14px;padding:16px">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:12px">
                <span style="font-size:20px">${r.icone||'🗺️'}</span>
                <span class="fw8 ff" style="font-size:14px;color:var(--tx)">${r.nome}</span>
                ${isMelhor?'<span style="font-size:10px;background:var(--gn);color:#000;padding:2px 8px;border-radius:99px;font-weight:700;margin-left:auto">✓ MELHOR</span>':''}
              </div>
              ${s ? `
                <div style="font-size:11px;color:var(--t2);margin-bottom:4px">Receita média/sem</div>
                <div class="fw8 c-gn" style="font-size:18px;margin-bottom:8px">${R$(s.recMedia)}</div>
                <div style="font-size:11px;color:var(--t2);margin-bottom:2px">Lucro médio/sem</div>
                <div class="fw8" style="font-size:16px;color:${s.lucroMedia>=0?'var(--gn)':'var(--rd)'};margin-bottom:8px">${R$(s.lucroMedia)}</div>
                <div class="row" style="padding:4px 0"><span class="rl" style="font-size:11px">Margem</span><span style="font-size:11px;font-weight:700;color:${s.margem>=0?'var(--gn)':'var(--rd)'}">${s.margem.toFixed(1)}%</span></div>
                <div class="row" style="padding:4px 0"><span class="rl" style="font-size:11px">Semanas</span><span class="rv" style="font-size:11px">${s.semanas}</span></div>
                <div class="row" style="padding:4px 0"><span class="rl" style="font-size:11px">Pacotes/sem</span><span class="rv" style="font-size:11px">${Math.round(s.pktsMedia).toLocaleString('pt-BR')}</span></div>
                <div class="row" style="padding:4px 0;border-bottom:none"><span class="rl" style="font-size:11px">Dias/sem</span><span class="rv" style="font-size:11px">${s.diasMedia.toFixed(1)}</span></div>
              ` : `<div style="font-size:12px;color:var(--t2);text-align:center;padding:16px 0">Sem dados lançados<br>para este período</div>`}
            </div>`;
        }).join('')}
      </div>
      ${melhor && statsArr.filter(x=>x.stats).length>1 ? `
        <div style="background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.25);border-radius:10px;padding:12px;font-size:13px;color:var(--gn)">
          ✅ <b>${melhor.rota.nome}</b> é mais lucrativa — lucro médio de <b>${R$(melhor.stats.lucroMedia)}/semana</b>
          ${statsArr.filter(x=>x.stats).length>1 ? ` (${R$(melhor.stats.lucroMedia - statsArr.filter(x=>x.stats&&x.rota.nome!==melhor.rota.nome).reduce((b,x)=>Math.max(b,x.stats.lucroMedia),0))} a mais/sem)` : ''}
        </div>` : ''}
      <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
        <button class="btn bsm" onclick="openModal('rota')">+ Nova Rota</button>
        ${rotas.map((r,i)=>`<button class="btn bsm bgh" onclick="openModal('editRota',${i})">✏️ ${r.nome}</button>`).join('')}
      </div>
    </div>`;

  // ── Bloco 2: Simulador ───────────────────────────────────────────
  const rotaSimIdx = DB.cfg.rotaSimIdx || 0;
  const rotaSim    = rotas[rotaSimIdx] || rotas[0];

  // Média real de pacotes/dia da rota com dados
  const rotaComDados = statsArr.find(x=>x.stats);
  const pktsMediaDiaReal = rotaComDados ? Math.round(rotaComDados.stats.pktsMedia / (rotaComDados.stats.diasMedia||5)) : 500;
  const pktsConservador  = Math.round(pktsMediaDiaReal * 0.7);
  const pktsRealista     = pktsMediaDiaReal;
  const pktsOtimista     = Math.round(pktsMediaDiaReal * 1.3);

  function cenarioHtml(label, pctPkts, cor, icone, rotaS, pktsBase, diasBase, motBase){
    const dias    = diasBase||rotaS?.diasPadrao||5;
    const pkts    = Math.round(pktsBase * pctPkts);
    const fixoDia = +rotaS?.fixoDia||c.fixoDia||0;
    const pedS    = +rotaS?.pedagioShopee||c.pedagioShopee||0;
    const pedGasto= +rotaS?.pedagioDia||c.pedagioDia||0;
    const motDia  = motBase||+c.diaria||0;
    const vrDia   = +c.valeRefeicaoDia||0;
    const fixaMes = (+c.financiamento||0)+(+c.seguro||0)+(c.fixasExtras||[]).reduce((a,x)=>a+(+x.valor||0),0);
    const rec     = fixoDia*dias + pedS*dias + pkts*dias*(+c.valorPacote||0.5);
    const mot     = (motDia+vrDia)*dias;
    const fixa    = fixaMes/4.3;
    const sobra   = (pedS - pedGasto)*dias;
    const lucro   = rec - mot - fixa;
    return `<div style="background:${cor}11;border:1.5px solid ${cor}44;border-radius:12px;padding:14px;text-align:center">
      <div style="font-size:18px;margin-bottom:4px">${icone}</div>
      <div style="font-size:11px;font-weight:700;color:${cor};text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${label}</div>
      <div style="font-size:11px;color:var(--t2);margin-bottom:2px">${pkts.toLocaleString('pt-BR')} pkts/dia · ${dias}d/sem</div>
      <div class="fw8" style="font-size:17px;color:${lucro>=0?'var(--gn)':'var(--rd)'};">${R$(lucro)}<span style="font-size:10px;font-weight:400;color:var(--t2)">/sem</span></div>
      <div style="font-size:11px;font-weight:700;color:${lucro>=0?'var(--gn)':'var(--rd)'};margin-top:2px">${R$(lucro*4.3)}/mês</div>
      ${sobra>0?`<div style="font-size:10px;color:var(--yw);margin-top:4px">+${R$(sobra)} sobra ped.</div>`:''}
    </div>`;
  }

  const simulador  = `
    <div class="card">
      <div class="ct">🎯 Simulador "E se?"</div>
      <div style="font-size:12px;color:var(--t2);margin-bottom:14px">Ajuste os valores e veja o impacto no lucro em tempo real. Slider e campo numérico são sincronizados.</div>

      ${rotas.length>1?`
        <div class="fld">
          <label class="lbl">Simular rota</label>
          <select class="inp" onchange="DB.cfg.rotaSimIdx=+this.value;save();window.render()">
            ${rotas.map((r,i)=>`<option value="${i}" ${i===rotaSimIdx?'selected':''}>${r.icone||'🗺️'} ${r.nome}</option>`).join('')}
          </select>
        </div>`:''}

      <div style="margin-bottom:16px">
          <div style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px">
            3 Cenários — baseados nos valores dos sliders abaixo
          </div>
          <div id="cenarios-grid" style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:14px">
            <!-- atualizado automaticamente -->
          </div>
        </div>

      <div style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:12px">Simulação livre</div>

      <div id="sim-result" style="background:var(--s2);border:1px solid var(--bd);border-radius:12px;padding:14px;margin-bottom:16px;text-align:center">
        <div id="sim-lucro" class="fw8 ff" style="font-size:26px;margin-bottom:2px">—</div>
        <div style="font-size:11px;color:var(--t2)">Lucro semanal · <span id="sim-lucro-mes" style="font-weight:700"></span> por mês</div>
      </div>

      <div class="fld">
        <label class="lbl">Dias trabalhados</label>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="range" id="sl-dias" min="1" max="6" value="${rotaSim?.diasPadrao||5}" oninput="syncSlider('dias',this.value);calcSim()" style="flex:1;accent-color:var(--ac)">
          <input type="number" id="inp-dias" min="1" max="6" value="${rotaSim?.diasPadrao||5}" oninput="syncInput('dias',this.value);calcSim()" style="width:64px;padding:8px;border-radius:8px;font-size:14px;font-weight:700;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx);text-align:center">
        </div>
      </div>

      <div class="fld">
        <label class="lbl">Pacotes por dia</label>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="range" id="sl-pkts" min="100" max="2000" step="50" value="${rotaSim?.pktsMediaDia||pktsMediaDiaReal||500}" oninput="syncSlider('pkts',this.value);calcSim()" style="flex:1;accent-color:var(--ac)">
          <input type="number" id="inp-pkts" min="100" max="2000" value="${rotaSim?.pktsMediaDia||pktsMediaDiaReal||500}" oninput="syncInput('pkts',this.value);calcSim()" style="width:80px;padding:8px;border-radius:8px;font-size:14px;font-weight:700;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx);text-align:center">
        </div>
      </div>

      <div class="fld">
        <label class="lbl">Pedágio gasto por dia (R$)</label>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="range" id="sl-ped" min="0" max="200" step="5" value="${rotaSim?.pedagioDia||c.pedagioDia||0}" oninput="syncSlider('ped',this.value);calcSim()" style="flex:1;accent-color:var(--ac)">
          <input type="number" id="inp-ped" min="0" max="200" value="${rotaSim?.pedagioDia||c.pedagioDia||0}" oninput="syncInput('ped',this.value);calcSim()" style="width:80px;padding:8px;border-radius:8px;font-size:14px;font-weight:700;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx);text-align:center">
        </div>
        <div style="font-size:11px;color:var(--t2);margin-top:4px">Usado para calcular a sobra de pedágio</div>
      </div>

      <div class="fld">
        <label class="lbl">Diária do motorista (R$)</label>
        <div style="display:flex;align-items:center;gap:10px">
          <input type="range" id="sl-mot" min="50" max="500" step="10" value="${c.diaria||200}" oninput="syncSlider('mot',this.value);calcSim()" style="flex:1;accent-color:var(--ac)">
          <input type="number" id="inp-mot" min="50" max="500" value="${c.diaria||200}" oninput="syncInput('mot',this.value);calcSim()" style="width:80px;padding:8px;border-radius:8px;font-size:14px;font-weight:700;background:var(--s2);border:1.5px solid var(--bd);color:var(--tx);text-align:center">
        </div>
      </div>

      <div id="sim-breakdown" style="background:var(--s2);border-radius:10px;padding:12px;font-size:12px;color:var(--t2);margin-top:4px;line-height:2"></div>
    </div>`;

  // ── Bloco 3 + 4: Diagnóstico e Equilíbrio filtrados pela rota selecionada ──
  // Estes blocos usam os valores do simulador (sliders) para a rota selecionada
  const rotaSimIdx2 = DB.cfg.rotaSimIdx || 0;
  const rotaAnalise = rotas[rotaSimIdx2] || rotas[0];
  const statsAnalise = statsArr[rotaSimIdx2]?.stats || null;

  // Calcula projeções usando valores configurados da rota
  function calcProjecao(rota, dias, pkts, motDia, pedGasto){
    const fixoDia   = +rota.fixoDia    || c.fixoDia    || 0;
    const pedS      = +rota.pedagioShopee || c.pedagioShopee || 0;
    const vrDia     = +c.valeRefeicaoDia || 0;
    const valPkt    = +c.valorPacote   || 0.5;
    const fixaMes   = (+c.financiamento||0)+(+c.seguro||0)+(c.fixasExtras||[]).reduce((a,x)=>a+(+x.valor||0),0);
    const recSem    = fixoDia*dias + pedS*dias + pkts*dias*valPkt;
    const motSem    = (motDia+vrDia)*dias;
    const fixaSem   = fixaMes/4.3;
    const despSem   = motSem + fixaSem;
    const lucroSem  = recSem - despSem;
    const sobraPed  = (pedS - pedGasto)*dias;
    const pctMot    = recSem>0?(motSem/recSem)*100:0;
    const pctFixa   = recSem>0?(fixaSem/recSem)*100:0;
    const margem    = recSem>0?(lucroSem/recSem)*100:0;
    const minPktsSem = fixaSem+motSem > 0 ? Math.ceil((fixaSem+motSem)/(valPkt*dias||1)) : 0;
    const sabValePena = (() => {
      const recExtra = fixoDia + pedS + pkts*valPkt;
      const despExtra = motDia+vrDia;
      return recExtra - despExtra;
    })();
    return {recSem,motSem,fixaSem,despSem,lucroSem,sobraPed,pctMot,pctFixa,margem,minPktsSem,sabValePena,fixaMes,pedS,dias,pkts};
  }

  // Valores padrão para rota sem dados (usa configuração da rota ou config geral)
  const diasSim = rotaAnalise?.diasPadrao || 5;
  const pktsSim = rotaAnalise?.pktsMediaDia || (statsAnalise ? Math.round(statsAnalise.pktsMedia/statsAnalise.diasMedia) : 500);
  const motSim  = +c.diaria || 200;
  const pedGastoSim = +rotaAnalise?.pedagioDia || +c.pedagioDia || 0;
  const proj = calcProjecao(rotaAnalise, diasSim, pktsSim, motSim, pedGastoSim);

  // Alertas inteligentes
  const diags = [];
  // Motorista
  if(proj.pctMot > 35) diags.push({tp:'a-rd',icon:'⚠️',title:'Custo do motorista alto',sub:`Representa ${proj.pctMot.toFixed(0)}% da receita — ideal abaixo de 35%. Considere reduzir a diária.`});
  else diags.push({tp:'a-gn',icon:'✅',title:'Custo do motorista saudável',sub:`Representa ${proj.pctMot.toFixed(0)}% da receita — dentro do ideal (< 35%)`});
  // Fixas
  if(proj.pctFixa > 30) diags.push({tp:'a-yw',icon:'🏗️',title:'Despesas fixas pesadas',sub:`Fixas representam ${proj.pctFixa.toFixed(0)}% da receita semanal — avalie renegociar financiamento ou seguro`});
  else diags.push({tp:'a-gn',icon:'✅',title:'Despesas fixas sob controle',sub:`Fixas representam ${proj.pctFixa.toFixed(0)}% da receita semanal`});
  // Margem
  if(proj.margem < 0) diags.push({tp:'a-rd',icon:'🚨',title:'Operação no prejuízo!',sub:`Margem de ${proj.margem.toFixed(1)}% — receita não cobre as despesas. Aumente o volume ou reduza custos.`});
  else if(proj.margem < 10) diags.push({tp:'a-yw',icon:'📉',title:`Margem baixa (${proj.margem.toFixed(1)}%)`,sub:'Margem abaixo de 10% — pequena variação de volume pode gerar prejuízo'});
  else if(proj.margem >= 20) diags.push({tp:'a-gn',icon:'🎯',title:`Operação saudável (${proj.margem.toFixed(1)}% de margem)`,sub:'Excelente resultado — operação bem equilibrada'});
  // Pedágio
  if(proj.sobraPed > 0) diags.push({tp:'a-gn',icon:'💛',title:`Sobra de pedágio: ${R$(proj.sobraPed)}/sem`,sub:`Você gasta menos pedágio do que a Shopee paga — ${R$(proj.sobraPed*4.3)} extras por mês`});
  else if(proj.sobraPed < 0) diags.push({tp:'a-rd',icon:'⛽',title:`Pedágio deficitário: ${R$(Math.abs(proj.sobraPed))}/sem`,sub:'Você gasta mais pedágio do que a Shopee paga — prejuízo no pedágio'});
  // Sábado vale a pena?
  if(proj.sabValePena > 0) diags.push({tp:'a-bl',icon:'📅',title:`Trabalhar sábado vale a pena!`,sub:`Cada sábado extra gera ${R$(proj.sabValePena)} de lucro adicional`});
  else diags.push({tp:'a-yw',icon:'📅',title:'Sábado não compensa neste cenário',sub:`O custo do dia extra supera a receita — verifique o volume de pacotes`});
  // Projeção anual
  diags.push({tp:'a-bl',icon:'💰',title:`Projeção anual: ${R$(proj.lucroSem*52)}`,sub:`Mantendo ${pktsSim} pkts/dia por ${diasSim}d/sem — ${R$(proj.lucroSem*4.3)} por mês`});

  const diagnostico = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="ct" style="margin-bottom:0">🚨 Diagnóstico Inteligente</div>
        <span style="font-size:12px;color:var(--t2);font-weight:600">${rotaAnalise?.icone||'🗺️'} ${rotaAnalise?.nome||''}</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;text-align:center">
        <div style="background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);border-radius:12px;padding:14px">
          <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Receita semanal</div>
          <div class="fw8 c-gn" style="font-size:17px">${R$(proj.recSem)}</div>
        </div>
        <div style="background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);border-radius:12px;padding:14px">
          <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Receita mensal</div>
          <div class="fw8 c-gn" style="font-size:17px">${R$(proj.recSem*4.3)}</div>
        </div>
        <div style="background:rgba(52,211,153,.07);border:1px solid rgba(52,211,153,.2);border-radius:12px;padding:14px">
          <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Receita anual</div>
          <div class="fw8 c-gn" style="font-size:17px">${R$(proj.recSem*52)}</div>
        </div>
        <div style="background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.2);border-radius:12px;padding:14px">
          <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Despesa semanal</div>
          <div class="fw8 c-rd" style="font-size:17px">${R$(proj.despSem)}</div>
        </div>
        <div style="background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.2);border-radius:12px;padding:14px">
          <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Despesa mensal</div>
          <div class="fw8 c-rd" style="font-size:17px">${R$(proj.despSem*4.3)}</div>
        </div>
        <div style="background:rgba(244,63,94,.07);border:1px solid rgba(244,63,94,.2);border-radius:12px;padding:14px">
          <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Despesa anual</div>
          <div class="fw8 c-rd" style="font-size:17px">${R$(proj.despSem*52)}</div>
        </div>
        <div style="background:${proj.lucroSem>=0?'rgba(52,211,153,.07)':'rgba(244,63,94,.07)'};border:1px solid ${proj.lucroSem>=0?'rgba(52,211,153,.2)':'rgba(244,63,94,.2)'};border-radius:12px;padding:14px">
          <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Lucro semanal</div>
          <div class="fw8" style="font-size:17px;color:${proj.lucroSem>=0?'var(--gn)':'var(--rd)'}">${R$(proj.lucroSem)}</div>
        </div>
        <div style="background:${proj.lucroSem>=0?'rgba(52,211,153,.07)':'rgba(244,63,94,.07)'};border:1px solid ${proj.lucroSem>=0?'rgba(52,211,153,.2)':'rgba(244,63,94,.2)'};border-radius:12px;padding:14px">
          <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Lucro mensal</div>
          <div class="fw8" style="font-size:17px;color:${proj.lucroSem>=0?'var(--gn)':'var(--rd)'}">${R$(proj.lucroSem*4.3)}</div>
        </div>
        <div style="background:${proj.lucroSem>=0?'rgba(52,211,153,.07)':'rgba(244,63,94,.07)'};border:1px solid ${proj.lucroSem>=0?'rgba(52,211,153,.2)':'rgba(244,63,94,.2)'};border-radius:12px;padding:14px">
          <div style="font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px">Lucro anual</div>
          <div class="fw8" style="font-size:17px;color:${proj.lucroSem>=0?'var(--gn)':'var(--rd)'}">${R$(proj.lucroSem*52)}</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--t2);margin-bottom:12px;text-align:center">
        Base: ${pktsSim} pkts/dia · ${diasSim} dias/sem · Motorista ${R$(motSim)}/dia
        <br><span style="font-size:10px">⚡ Atualize os sliders do simulador para recalcular automaticamente</span>
      </div>
      ${diags.map(d=>`<div class="alrt ${d.tp}"><div class="aicon">${d.icon}</div><div><div class="atitle">${d.title}</div><div class="asub">${d.sub}</div></div></div>`).join('')}
    </div>`;

  // ── Bloco 4: Ponto de Equilíbrio ─────────────────────────────────
  const minPktsSem = proj.minPktsSem;
  const minPktsMes = Math.ceil(minPktsSem * 4.3);
  const pktsSemAtual = statsAnalise ? Math.round(statsAnalise.pktsMedia) : pktsSim;
  const pktsMesAtual = Math.round(pktsSemAtual * 4.3);
  const pctSem = minPktsSem>0 ? Math.min(150, Math.round((pktsSemAtual/minPktsSem)*100)) : 100;
  const pctMes = minPktsMes>0 ? Math.min(150, Math.round((pktsMesAtual/minPktsMes)*100)) : 100;
  const statusSem = pctSem>=100?{cor:'var(--gn)',txt:'✅ Acima do equilíbrio'}:pctSem>=80?{cor:'var(--yw)',txt:'⚠️ Próximo do limite'}:{cor:'var(--rd)',txt:'🚨 Abaixo do mínimo'};
  const statusMes = pctMes>=100?{cor:'var(--gn)',txt:'✅ Acima do equilíbrio'}:pctMes>=80?{cor:'var(--yw)',txt:'⚠️ Próximo do limite'}:{cor:'var(--rd)',txt:'🚨 Abaixo do mínimo'};

  const equilibrio = `
    <div class="card">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div class="ct" style="margin-bottom:0">📈 Ponto de Equilíbrio</div>
        <span style="font-size:12px;color:var(--t2);font-weight:600">${rotaAnalise?.icone||'🗺️'} ${rotaAnalise?.nome||''}</span>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">Por semana</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
            <div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center">
              <div style="font-size:10px;color:var(--t2);margin-bottom:4px">Mínimo</div>
              <div class="fw8 c-yw" style="font-size:18px">${minPktsSem.toLocaleString('pt-BR')}</div>
              <div style="font-size:10px;color:var(--t2)">pacotes</div>
            </div>
            <div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center">
              <div style="font-size:10px;color:var(--t2);margin-bottom:4px">${statsAnalise?'Média real':'Simulado'}</div>
              <div class="fw8" style="font-size:18px;color:${pctSem>=100?'var(--gn)':'var(--rd)'}">${pktsSemAtual.toLocaleString('pt-BR')}</div>
              <div style="font-size:10px;color:var(--t2)">pacotes</div>
            </div>
          </div>
          <div style="font-size:11px;color:var(--t2);margin-bottom:5px">${pctSem}% do mínimo · <span style="color:${statusSem.cor};font-weight:700">${statusSem.txt}</span></div>
          <div style="background:var(--bd);border-radius:99px;height:10px;overflow:hidden">
            <div style="height:100%;border-radius:99px;background:${statusSem.cor};width:${Math.min(100,pctSem)}%;transition:width .6s"></div>
          </div>
          <div style="font-size:11px;margin-top:6px;color:${pctSem>=100?'var(--gn)':'var(--rd)'}">
            ${pctSem>=100?`+${(pktsSemAtual-minPktsSem).toLocaleString('pt-BR')} acima do mínimo`:`Faltam ${(minPktsSem-pktsSemAtual).toLocaleString('pt-BR')} pacotes`}
          </div>
        </div>
        <div>
          <div style="font-size:12px;font-weight:700;color:var(--t2);margin-bottom:10px;text-transform:uppercase;letter-spacing:.05em">Por mês</div>
          <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:10px">
            <div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center">
              <div style="font-size:10px;color:var(--t2);margin-bottom:4px">Mínimo</div>
              <div class="fw8 c-yw" style="font-size:18px">${minPktsMes.toLocaleString('pt-BR')}</div>
              <div style="font-size:10px;color:var(--t2)">pacotes</div>
            </div>
            <div style="background:var(--s2);border-radius:10px;padding:12px;text-align:center">
              <div style="font-size:10px;color:var(--t2);margin-bottom:4px">${statsAnalise?'Média real':'Simulado'}</div>
              <div class="fw8" style="font-size:18px;color:${pctMes>=100?'var(--gn)':'var(--rd)'}">${pktsMesAtual.toLocaleString('pt-BR')}</div>
              <div style="font-size:10px;color:var(--t2)">pacotes</div>
            </div>
          </div>
          <div style="font-size:11px;color:var(--t2);margin-bottom:5px">${pctMes}% do mínimo · <span style="color:${statusMes.cor};font-weight:700">${statusMes.txt}</span></div>
          <div style="background:var(--bd);border-radius:99px;height:10px;overflow:hidden">
            <div style="height:100%;border-radius:99px;background:${statusMes.cor};width:${Math.min(100,pctMes)}%;transition:width .6s"></div>
          </div>
          <div style="font-size:11px;margin-top:6px;color:${pctMes>=100?'var(--gn)':'var(--rd)'}">
            ${pctMes>=100?`+${(pktsMesAtual-minPktsMes).toLocaleString('pt-BR')} acima do mínimo`:`Faltam ${(minPktsMes-pktsMesAtual).toLocaleString('pt-BR')} pacotes`}
          </div>
        </div>
      </div>
      <div style="margin-top:14px;padding:12px;background:var(--s2);border-radius:10px;font-size:12px;color:var(--t2);text-align:center">
        💡 Ponto de equilíbrio calculado com base nos valores do simulador acima.<br>
        Altere os sliders para ver como muda o mínimo necessário.
      </div>
    </div>`;

  return `
    <div class="sh">
      <div class="st">🔍 Análise de Rotas</div>
      <button class="btn bsm" onclick="openModal('rota')">+ Nova Rota</button>
    </div>
    ${comparativo}
    ${simulador}
    ${diagnostico}
    ${equilibrio}`;
}

// ── Sync slider ↔ input ───────────────────────────────────────────
window.syncSlider = function(id, val){ const el=document.getElementById('inp-'+id); if(el) el.value=val; };
window.syncInput  = function(id, val){ const el=document.getElementById('sl-'+id);  if(el) el.value=val; };

// ── Calc simulador ────────────────────────────────────────────────
window.calcSim = function(){
  const c       = DB.cfg;
  const ri      = DB.cfg.rotaSimIdx || 0;
  const rota    = (DB.cfg.rotas||[])[ri] || {};
  const dias    = +document.getElementById('inp-dias')?.value || +document.getElementById('sl-dias')?.value || 5;
  const pkts    = +document.getElementById('inp-pkts')?.value || +document.getElementById('sl-pkts')?.value || 500;
  const pedGasto= +document.getElementById('inp-ped')?.value  || +document.getElementById('sl-ped')?.value  || 0;
  const motDia  = +document.getElementById('inp-mot')?.value  || +document.getElementById('sl-mot')?.value  || c.diaria||200;
  const fixoDia    = +rota.fixoDia       || c.fixoDia       || 0;
  const pedShopee  = +rota.pedagioShopee || c.pedagioShopee || 0;
  const valPacote  = +c.valorPacote      || 0.5;
  const fixaMensal = (+c.financiamento||0)+(+c.seguro||0)+(c.fixasExtras||[]).reduce((a,x)=>a+(+x.valor||0),0);
  const recSem     = fixoDia*dias + pedShopee*dias + pkts*dias*valPacote;
  const motSem     = (motDia + (+c.valeRefeicaoDia||0)) * dias;
  const fixaSem    = fixaMensal / 4.3;
  const despSem    = motSem + fixaSem;
  const lucroSem   = recSem - despSem;
  const lucroMes   = lucroSem * 4.3;
  const sobraPed   = (pedShopee - pedGasto) * dias;
  const el  = document.getElementById('sim-lucro');
  const elm = document.getElementById('sim-lucro-mes');
  const bd  = document.getElementById('sim-breakdown');
  if(el){  el.textContent  = R$(lucroSem); el.style.color = lucroSem>=0?'var(--gn)':'var(--rd)'; }
  if(elm){ elm.textContent = R$(lucroMes); elm.style.color= lucroMes>=0?'var(--gn)':'var(--rd)'; }
  if(bd){ bd.innerHTML = `
    <div class="row" style="padding:5px 0"><span>💰 Receita estimada/sem</span><b style="color:var(--gn)">${R$(recSem)}</b></div>
    <div class="row" style="padding:5px 0"><span>🏁 Fixo (${dias}d × ${R$(fixoDia)})</span><b>${R$(fixoDia*dias)}</b></div>
    <div class="row" style="padding:5px 0"><span>🛣️ Pedágio Shopee (${dias}d)</span><b>${R$(pedShopee*dias)}</b></div>
    <div class="row" style="padding:5px 0"><span>📦 Pacotes (${pkts}/dia × ${dias}d)</span><b>${R$(pkts*dias*valPacote)}</b></div>
    ${sobraPed>0?`<div class="row" style="padding:5px 0"><span>💛 Sobra de pedágio</span><b style="color:var(--yw)">${R$(sobraPed)}</b></div>`:''}
    <div class="row" style="padding:5px 0"><span>👤 Motorista</span><b style="color:var(--bl)">${R$(motSem)}</b></div>
    <div class="row" style="padding:5px 0;border-bottom:none"><span>📋 Fixas pro-rata/sem</span><b style="color:var(--rd)">${R$(fixaSem)}</b></div>
  `; }
  // Update 3 cenarios dynamically
  const grid = document.getElementById('cenarios-grid');
  if(grid){
    const pBase = pkts;
    const dBase = dias;
    const mBase = motDia;
    grid.innerHTML = [
      ['Conservador', 0.7, '#f43f5e', '🔴'],
      ['Realista',    1.0, '#fbbf24', '🟡'],
      ['Otimista',    1.3, '#34d399', '🟢'],
    ].map(([label, pct, cor, icone]) => {
      const p  = Math.round(pBase * pct);
      const r  = fixoDia*dBase + pedShopee*dBase + p*dBase*valPacote;
      const m  = (mBase+(+c.valeRefeicaoDia||0))*dBase;
      const f  = fixaMensal/4.3;
      const l  = r - m - f;
      const sb = (pedShopee - pedGasto)*dBase;
      return `<div style="background:${cor}11;border:1.5px solid ${cor}44;border-radius:12px;padding:14px;text-align:center">
        <div style="font-size:18px;margin-bottom:4px">${icone}</div>
        <div style="font-size:11px;font-weight:700;color:${cor};text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px">${label}</div>
        <div style="font-size:11px;color:var(--t2);margin-bottom:4px">${p.toLocaleString('pt-BR')} pkts/dia · ${dBase}d</div>
        <div class="fw8" style="font-size:17px;color:${l>=0?'var(--gn)':'var(--rd)'};">${R$(l)}<span style="font-size:10px;font-weight:400;color:var(--t2)">/sem</span></div>
        <div style="font-size:11px;font-weight:700;color:${l>=0?'var(--gn)':'var(--rd)'};margin-top:3px">${R$(l*4.3)}/mês</div>
        ${sb>0?`<div style="font-size:10px;color:var(--yw);margin-top:4px">+${R$(sb)} sobra ped.</div>`:''}
      </div>`;
    }).join('');
  }
};

// ── Modal Rota ────────────────────────────────────────────────────
function modalRota(idx){
  const rotas = DB.cfg.rotas || [];
  const r = idx !== undefined ? rotas[idx] : null;
  const isEdit = r !== null && r !== undefined;
  return `
    <div class="mh"><span class="mt">${isEdit?'Editar Rota':'Nova Rota'}</span><button class="mc" onclick="closeModal()">×</button></div>
    <div class="fld"><label class="lbl">Nome da rota</label><input class="inp" id="rt-nome" placeholder="Ex: Rota Nova, Rota Centro" value="${r?.nome||''}"></div>
    <div class="fld"><label class="lbl">Ícone (emoji)</label><input class="inp" id="rt-icon" placeholder="Ex: 🗺️ 🚛 📦" value="${r?.icone||'🗺️'}" style="font-size:20px;width:100px"></div>
    <div class="fld"><label class="lbl">Data de início desta rota</label><input class="inp" type="date" id="rt-inicio" value="${r?.dataInicio||''}"><div style="font-size:11px;color:var(--t2);margin-top:4px">Lançamentos a partir desta data serão desta rota</div></div>
    <div class="fld"><label class="lbl">Data de fim (deixe vazio se ainda ativa)</label><input class="inp" type="date" id="rt-fim" value="${r?.dataFim||''}"></div>
    <div style="font-size:11px;font-weight:700;color:var(--t2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:10px;margin-top:4px">Valores desta rota (se diferentes da config)</div>
    <div class="inp-row">
      <div class="fld"><label class="lbl">Fixo/dia (R$)</label><input class="inp" type="number" id="rt-fixo" value="${r?.fixoDia||DB.cfg.fixoDia||0}" placeholder="${DB.cfg.fixoDia||0}"></div>
      <div class="fld"><label class="lbl">Ped.Shopee/dia (R$)</label><input class="inp" type="number" id="rt-ped" value="${r?.pedagioShopee||DB.cfg.pedagioShopee||0}" placeholder="${DB.cfg.pedagioShopee||0}"></div>
    </div>
    <div class="inp-row">
      <div class="fld"><label class="lbl">Dias padrão/sem</label><input class="inp" type="number" id="rt-dias" value="${r?.diasPadrao||5}" min="1" max="6"></div>
      <div class="fld"><label class="lbl">Pkts médios/dia</label><input class="inp" type="number" id="rt-pkts" value="${r?.pktsMediaDia||500}"></div>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn" onclick="saveRota(${isEdit?idx:'null'})" style="flex:2">💾 ${isEdit?'Salvar alterações':'Cadastrar rota'}</button>
      ${isEdit?`<button class="btn brd" onclick="delRota(${idx})" style="flex:1">🗑 Excluir</button>`:''}
    </div>`;
}

window.saveRota = function(idx){
  const nome  = document.getElementById('rt-nome')?.value.trim();
  if(!nome){ alert('Informe o nome da rota.'); return; }
  if(!DB.cfg.rotas) DB.cfg.rotas = [];
  const rota = {
    nome, icone: document.getElementById('rt-icon')?.value||'🗺️',
    dataInicio: document.getElementById('rt-inicio')?.value||'',
    dataFim:    document.getElementById('rt-fim')?.value||'',
    fixoDia:    +document.getElementById('rt-fixo')?.value||0,
    pedagioShopee: +document.getElementById('rt-ped')?.value||0,
    diasPadrao: +document.getElementById('rt-dias')?.value||5,
    pktsMediaDia: +document.getElementById('rt-pkts')?.value||500,
  };
  if(idx !== null && idx !== undefined) DB.cfg.rotas[idx] = rota;
  else DB.cfg.rotas.push(rota);
  save(); closeModal(); render(); showToast('✅ Rota salva!');
};
window.delRota = function(idx){
  if(!confirm('Excluir esta rota?')) return;
  DB.cfg.rotas.splice(idx,1); save(); closeModal(); render();
};
function showToast(msg){ const t=document.createElement('div'); t.textContent=msg; t.style.cssText='position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:#1c1f27;color:#eef0f4;padding:10px 20px;border-radius:20px;font-size:13px;font-weight:600;z-index:2000;border:1px solid #272b36;white-space:nowrap;box-shadow:0 8px 24px rgba(0,0,0,.4)'; document.body.appendChild(t); setTimeout(()=>t.remove(),2500); }

// ═══════════ RENDER ═══════════════════════════════════════════════
function empty(t){ return `<div class="empty"><div style="font-size:44px;margin-bottom:10px">📭</div><p style="font-size:14px">${t}</p></div>`; }
window.render=function render(){
  const c=document.getElementById('cnt'); if(!c)return;
  if(TAB==='dash') c.innerHTML=renderDash();
  if(TAB==='ent')  c.innerHTML=renderEnt();
  if(TAB==='desp') c.innerHTML=renderDesp();
  if(TAB==='anal') { c.innerHTML=renderAnal(); setTimeout(calcSim,50); }
  if(TAB==='cfg')  c.innerHTML=renderCfg();
}
</script>
</body>
</html>
